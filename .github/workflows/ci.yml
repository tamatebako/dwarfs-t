# Main CI Workflow
#
# Runs on every push to main and feature branches.
# Tests Linux x64 with both production and experimental configurations.
#
# Production: FlatBuffers + Legacy Thrift (stable, ~15 min)
# Experimental: Production + Modern Thrift (folly/fbthrift, ~45 min)
#   NOTE: Experimental may fail due to folly complexity - marked continue-on-error
#
# For full cross-platform matrix, use ci-matrix.yml.

name: CI

on:
  push:
    branches: [main, feature/**]
    paths-ignore:
      - '.benchmark/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.gitignore'
      - '.maintainer-scripts/**'
      - 'CHANGES.md'
      - 'CITATION.cff'
      - 'doc/**'
      - 'TODO'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ========================================================================
  # Production Build (Must Succeed)
  # ========================================================================
  production:
    name: 📦 Linux x64 · Production
    uses: ./.github/workflows/_build.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: production
      vcpkg-manifest: vcpkg-production.json

  # ========================================================================
  # Experimental Build (May Fail - Known Issues with folly/fbthrift)
  # ========================================================================
  experimental:
    name: 🧪 Linux x64 · Experimental
    uses: ./.github/workflows/_build.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: experimental
      vcpkg-manifest: vcpkg-experimental.json
      continue-on-error: true  # Experimental code may be unstable

  # ========================================================================
  # Dynamic Production Build
  # ========================================================================
  dynamic:
    name: 🔧 Linux x64 · Dynamic
    uses: ./.github/workflows/_build.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux-dynamic
      config: production
      vcpkg-manifest: vcpkg-production.json

  # ========================================================================
  # Summary
  # ========================================================================
  summary:
    name: 📊 Summary
    needs: [production, experimental, dynamic]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Results
        run: |
          echo "# CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Production | ${{ needs.production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Experimental | ${{ needs.experimental.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Dynamic | ${{ needs.dynamic.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.experimental.result }}" != "success" ]; then
            echo "⚠️ **Note:** Experimental build is allowed to fail due to known issues with folly/fbthrift dependencies." >> $GITHUB_STEP_SUMMARY
          fi
