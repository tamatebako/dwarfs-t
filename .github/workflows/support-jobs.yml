---
name: Support Jobs

on:
  workflow_call:

permissions:
  contents: read

jobs:
  package-source:
    uses: ./.github/workflows/docker-run-build.yml
    with:
      build_type: clang-release-ninja-source-notest
      build_arch: amd64
      build_dist: arch

  allocator-testing:
    name: Allocator - ${{ matrix.platform }} - ${{ matrix.allocator }}

    strategy:
      fail-fast: false
      matrix:
        include:
          #####################################################################
          #                    Linux x86_64 Allocator Tests                   #
          #####################################################################

          - platform: linux-amd64
            build_arch: amd64
            build_dist: ubuntu
            build_type: gcc-release-jemalloc-ninja-split
            allocator: jemalloc

          - platform: linux-amd64
            build_arch: amd64
            build_dist: ubuntu
            build_type: gcc-release-mimalloc-ninja-split
            allocator: mimalloc

          #####################################################################
          #                    Linux ARM64 Allocator Tests                    #
          #####################################################################

          - platform: linux-arm64
            build_arch: arm64v8
            build_dist: ubuntu
            build_type: gcc-release-jemalloc-ninja-split
            allocator: jemalloc

          - platform: linux-arm64
            build_arch: arm64v8
            build_dist: ubuntu
            build_type: gcc-release-mimalloc-ninja-split
            allocator: mimalloc

          #####################################################################
          #                    Alpine Static Allocator Tests                  #
          #####################################################################

          - platform: alpine-amd64
            build_arch: amd64
            build_dist: alpine
            build_type: gcc-release-jemalloc-ninja-static
            allocator: jemalloc

          - platform: alpine-amd64
            build_arch: amd64
            build_dist: alpine
            build_type: gcc-release-mimalloc-ninja-static
            allocator: mimalloc

    uses: ./.github/workflows/docker-run-build.yml
    with:
      build_type: ${{ matrix.build_type }}
      build_arch: ${{ matrix.build_arch }}
      build_dist: ${{ matrix.build_dist }}
      build_from_tarball: true
      upload_artifacts: false

  benchmark-smoke:
    name: Benchmark Smoke Test - ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
            artifact: dwarfs-linux-amd64-static
            ext: ''

          - platform: macos-arm64
            runner: macos-14
            artifact: dwarfs-macos-arm64
            ext: ''

          - platform: windows-x64
            runner: windows-latest
            artifact: dwarfs-windows-x64-all-formats
            ext: '.exe'

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: binaries

      - name: Make Executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x binaries/dwarfs_benchmark

      - name: Run Creation Benchmark
        continue-on-error: true
        shell: bash
        run: |
          ./binaries/dwarfs_benchmark${{ matrix.ext }} \
            --benchmark_min_time=0.1s \
            --benchmark_filter=.*Creation.*

      - name: Run Decompression Benchmark
        continue-on-error: true
        shell: bash
        run: |
          ./binaries/dwarfs_benchmark${{ matrix.ext }} \
            --benchmark_min_time=0.1s \
            --benchmark_filter=.*Decompression.*