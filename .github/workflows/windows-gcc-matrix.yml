# MinGW/MSYS Matrix Workflow
#
# Separate workflow for GCC-based Windows builds.
# These use completely different toolchains and build configurations than MSVC.
#
# Key Differences from MSVC Builds:
# - Uses GCC instead of MSVC
# - Different CMake generator and flags
# - Uses MinGW/MSYS toolchains with vcpkg for dependency management
# - Different runtime linking (libstdc++, libgcc)
# - Console subsystem by default (no -mwindows flag issues)
#
# Strategy:
# - Use vcpkg for dependency management (same as MSVC, different toolchain)
# - Use native MinGW/MSYS toolchains without MSVC compatibility hacks
# - Keep configurations simple and GCC-native

name: Windows GCC Matrix

on:
  pull_request:
    branches: [main, feature/*]
  push:
    branches: [main, feature/**]
    paths-ignore:
      - '.benchmark/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.gitignore'
      - '.maintainer-scripts/**'
      - 'CHANGES.md'
      - 'CITATION.cff'
      - 'doc/**'
      - 'TODO'
  workflow_dispatch:

concurrency:
  group: windows-gcc-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write  # Required for GitHub Packages binary caching

env:
  GCC_VERSION: '14'
  VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/vcpkg_ports
  VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/vcpkg_triplets
  VCPKG_COMMIT: f14401ca0f2754347c3864da7488a9b955b4e47a

jobs:
  # ========================================================================
  # MinGW Build (native Windows GCC)
  # ========================================================================
  mingw:
    name: 🔧 MinGW x64
    runs-on: windows-latest
    continue-on-error: true  # Experimental

    defaults:
      run:
        shell: bash

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: 🔧 Setup MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-python
            mingw-w64-x86_64-pkgconf
            git

      - name: 📦 Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          vcpkgJsonGlob: vcpkg-production.json
          vcpkgConfigurationJsonGlob: vcpkg-configuration.json
          vcpkgDirectory: ${{ github.workspace }}/../vcpkg

      - name: 🔨 Install CMake and Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: latest
          ninjaVersion: latest

      - name: 📦 Install Python dependencies
        run: |
          # Use python -m pip to avoid self-upgrade issues
          python -m pip install --upgrade pip
          python -m pip install argcomplete

      - name: 💾 Setup ccache
        uses: Chocobo1/setup-ccache-action@v1
        with:
          store_cache: false
          restore_cache: false
          remove_stale_cache: true
          override_cache_key: ccache_mingw64

      - name: 🏗️ Build and Test
        uses: lukka/run-cmake@v10
        with:
          configurePreset: x64-windows-mingw-production
          buildPreset: x64-windows-mingw-production
          testPreset: x64-windows-mingw-production

  # ========================================================================
  # MSYS2 Build (Unix-like environment on Windows)
  # ========================================================================
  msys:
    name: 🔧 MSYS2 x64
    runs-on: windows-latest
    continue-on-error: true  # Experimental

    defaults:
      run:
        shell: bash

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: 🔧 Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-python
            mingw-w64-x86_64-pkgconf
            git

      - name: 📦 Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          vcpkgJsonGlob: vcpkg-production.json
          vcpkgConfigurationJsonGlob: vcpkg-configuration.json
          vcpkgDirectory: ${{ github.workspace }}/../vcpkg

      - name: 🔨 Install CMake and Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: latest
          ninjaVersion: latest

      - name: 📦 Install Python dependencies
        run: |
          # Use python -m pip to avoid self-upgrade issues
          python -m pip install --upgrade pip
          python -m pip install argcomplete

      - name: 💾 Setup ccache
        uses: Chocobo1/setup-ccache-action@v1
        with:
          store_cache: false
          restore_cache: false
          remove_stale_cache: true
          override_cache_key: ccache_msys2

      - name: 🏗️ Build and Test
        uses: lukka/run-cmake@v10
        with:
          configurePreset: x64-windows-msys-production
          buildPreset: x64-windows-msys-production
          testPreset: x64-windows-msys-production

  # ========================================================================
  # Summary
  # ========================================================================
  summary:
    name: 📊 Summary
    needs:
      - mingw
      - msys
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📊 Results
        run: |
          echo "# Windows GCC Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| MinGW x64 | ${{ needs.mingw.result == 'success' && 'success' || needs.mingw.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MSYS2 x64 | ${{ needs.msys.result == 'success' && 'success' || needs.msys.result }} |" >> $GITHUB_STEP_SUMMARY
