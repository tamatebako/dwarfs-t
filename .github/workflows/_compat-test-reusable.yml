# Reusable Compatibility Test Workflow
#
# This workflow tests compatibility with Homebrew-installed dwarfs.
# It verifies that images created by the current build can be read
# by Homebrew dwarfs and vice versa.
#
# Usage:
#   jobs:
#     compat-test:
#       uses: ./.github/workflows/_compat-test-reusable.yml
#       with:
#         runner: macos-14

name: Reusable Compatibility Test

on:
  workflow_call:
    inputs:
      runner:
        description: 'GitHub Actions runner to use'
        required: false
        type: string
        default: macos-14
      triplet:
        description: 'vcpkg triplet to use (auto-detected from runner if not specified)'
        required: false
        type: string
      config:
        description: 'Build configuration to test'
        required: false
        type: string
        default: both-formats
      cache-key:
        description: 'Cache key prefix for vcpkg'
        required: false
        type: string
        default: compat

jobs:
  compat-test:
    name: Compatibility Test - ${{ inputs.runner }}
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Homebrew dwarfs
        uses: ./.github/actions/setup-homebrew-dwarfs

      - name: Detect triplet
        id: detect-triplet
        run: |
          if [[ -n "${{ inputs.triplet }}" ]]; then
            TRIPLET="${{ inputs.triplet }}"
          else
            case "${{ inputs.runner }}" in
              macos-14)
                TRIPLET="arm64-osx"
                ;;
              macos-13)
                TRIPLET="x64-osx"
                ;;
              macos-12*)
                TRIPLET="x64-osx"
                ;;
              *)
                TRIPLET="x64-osx"
                ;;
            esac
          fi
          echo "triplet=$TRIPLET" >> $GITHUB_OUTPUT

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          triplet: ${{ steps.detect-triplet.outputs.triplet }}
          cache-key: ${{ inputs.cache-key }}

      - name: Setup build dependencies
        uses: ./.github/actions/setup-build-deps
        with:
          platform: ${{ inputs.runner }}

      - name: Configure with compatibility tests
        uses: ./.github/actions/configure-cmake
        with:
          build-dir: build-compat
          build-type: Release
          with-tests: true
          with-libdwarfs: true
          with-tools: true
          with-fuse-driver: false
          with-thrift: ${{ inputs.config == 'both-formats' }}
          with-flatbuffers: true
          toolchain-file: ${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          cmake-args: |
            -DVCPKG_TARGET_TRIPLET=${{ steps.detect-triplet.outputs.triplet }}
            -DWITH_COMPAT_TESTS=ON

      - name: Build compatibility test library
        shell: bash
        run: |
          set -x
          cmake --build build-compat --target dwarfs-compat-lib -j$(sysctl -n hw.ncpu || nproc)

      - name: Run compatibility tests
        shell: bash
        working-directory: test/compat
        run: |
          if [[ -f "./scripts/run_tests.sh" ]]; then
            echo "Running compatibility test script..."
            ./scripts/run_tests.sh --all --format json
          elif [[ -f "./scripts/tests/run_all.sh" ]]; then
            echo "Running all compatibility tests..."
            ./scripts/tests/run_all.sh
          else
            echo "Running compatibility test binary directly..."
            ../build-compat/test/compat/read_homebrew_files_test || echo "Test binary not found or failed"
          fi

      - name: Display test results
        if: always()
        shell: bash
        run: |
          echo "=== Compatibility Test Results ==="
          if [[ -d "test/compat/results" ]]; then
            echo "Results directory:"
            ls -la test/compat/results/
            if ls test/compat/results/*.json 2>/dev/null; then
              echo ""
              echo "JSON results:"
              cat test/compat/results/*.json | head -100
            fi
          fi

      - name: Upload compatibility test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compat-results-${{ inputs.runner }}-${{ github.run_id }}
          path: |
            test/compat/results-*.json
            test/compat/fixtures/
            build-compat/Testing/
          if-no-files-found: warn

      - name: Check test results
        if: always()
        run: |
          if [[ -d "build-compat/Testing" ]]; then
            echo "CTest results:"
            if [[ -f "build-compat/Testing/Test.xml" ]]; then
              cat build-compat/Testing/Test.xml
            fi
          fi
