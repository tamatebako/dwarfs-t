name: Tebako Lint

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - tebako-*
    paths:
      - 'cmake/tebako/**'
      - 'cmake/tebako.cmake'
      - '**.md'
      - '.github/workflows/tebako-lint.yml'
  pull_request:
    paths:
      - 'cmake/tebako/**'
      - 'cmake/tebako.cmake'
      - '**.md'
      - '.github/workflows/tebako-lint.yml'
  workflow_dispatch:

jobs:
  cmake-lint:
    name: CMake Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install cmake-format
        run: |
          pip install cmakelang

      - name: Check CMake formatting
        run: |
          echo "=== Checking CMake file formatting ==="

          # Find all CMake files in tebako directory
          find cmake/tebako -name "*.cmake" -type f | while read file; do
            echo "Checking $file..."
            cmake-format --check "$file" || {
              echo "✗ $file needs formatting"
              echo "Run: cmake-format -i $file"
              exit 1
            }
          done

          # Check main tebako.cmake file
          if [ -f "cmake/tebako.cmake" ]; then
            echo "Checking cmake/tebako.cmake..."
            cmake-format --check cmake/tebako.cmake || {
              echo "✗ cmake/tebako.cmake needs formatting"
              echo "Run: cmake-format -i cmake/tebako.cmake"
              exit 1
            }
          fi

          echo "✓ All CMake files are properly formatted"

      - name: Validate CMake syntax
        run: |
          echo "=== Validating CMake syntax ==="

          # Create a test build directory
          mkdir -p build-syntax-check
          cd build-syntax-check

          # Try to configure (will fail if syntax errors exist)
          cmake .. \
            -DUSE_TEBAKO=OFF \
            -DWITH_TESTS=OFF \
            -DWITH_TOOLS=OFF 2>&1 | tee cmake-output.log || {
            echo "✗ CMake configuration failed"
            cat cmake-output.log
            exit 1
          }

          echo "✓ CMake syntax validation passed"

      - name: Check for common CMake issues
        run: |
          echo "=== Checking for common CMake issues ==="

          # Check for hardcoded paths
          if grep -r "/usr/local" cmake/tebako/ 2>/dev/null; then
            echo "⚠ Warning: Hardcoded /usr/local paths found"
          fi

          # Check for missing error handling
          missing_error_handling=0
          for file in cmake/tebako/*.cmake; do
            if grep -q "execute_process" "$file"; then
              if ! grep -A 5 "execute_process" "$file" | grep -q "RESULT_VARIABLE"; then
                echo "⚠ Warning: execute_process without RESULT_VARIABLE in $file"
                missing_error_handling=1
              fi
            fi
          done

          # Check for proper variable quoting
          if grep -rE '\$\{[A-Z_]+\}[^"]' cmake/tebako/ | grep -v "\.cmake:#"; then
            echo "⚠ Warning: Unquoted variables found (may cause issues with spaces)"
          fi

          echo "✓ Common issues check completed"

  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Create markdownlint config
        run: |
          cat > .markdownlint.json << 'EOF'
          {
            "default": true,
            "MD013": false,
            "MD033": false,
            "MD041": false,
            "MD007": { "indent": 2 }
          }
          EOF

      - name: Lint tebako documentation
        run: |
          echo "=== Linting tebako-related Markdown files ==="

          markdownlint \
            TEBAKO_README.md \
            CONTRIBUTING_TEBAKO.md \
            TEBAKO_CMAKE_ARCHITECTURE.md \
            tebako-patches/*.md \
            || {
            echo "✗ Markdown linting failed"
            echo "Fix issues or update .markdownlint.json to adjust rules"
            exit 1
          }

          echo "✓ Markdown linting passed"

      - name: Check for broken links
        run: |
          echo "=== Checking for broken internal links ==="

          # Simple check for broken internal file links
          for md_file in TEBAKO_README.md CONTRIBUTING_TEBAKO.md tebako-patches/*.md; do
            if [ -f "$md_file" ]; then
              echo "Checking links in $md_file..."

              # Extract file paths from markdown links
              grep -oP '\[.*?\]\(\K[^)#]+' "$md_file" 2>/dev/null | while read link; do
                # Skip external links
                if [[ "$link" =~ ^https?:// ]]; then
                  continue
                fi

                # Check if file exists
                if [ ! -f "$link" ] && [ ! -d "$link" ]; then
                  echo "⚠ Warning: Broken link to $link in $md_file"
                fi
              done
            fi
          done

          echo "✓ Link check completed"

  whitespace-check:
    name: Whitespace and Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for trailing whitespace
        run: |
          echo "=== Checking for trailing whitespace ==="

          files_with_trailing_ws=0

          # Check CMake files
          find cmake/tebako -name "*.cmake" -type f | while read file; do
            if grep -n ' $' "$file"; then
              echo "✗ Trailing whitespace found in $file"
              files_with_trailing_ws=$((files_with_trailing_ws + 1))
            fi
          done

          # Check Markdown files
          for md_file in TEBAKO_README.md CONTRIBUTING_TEBAKO.md tebako-patches/*.md; do
            if [ -f "$md_file" ]; then
              if grep -n ' $' "$md_file"; then
                echo "✗ Trailing whitespace found in $md_file"
                files_with_trailing_ws=$((files_with_trailing_ws + 1))
              fi
            fi
          done

          if [ $files_with_trailing_ws -eq 0 ]; then
            echo "✓ No trailing whitespace found"
          else
            echo "✗ Found trailing whitespace in $files_with_trailing_ws file(s)"
            exit 1
          fi

      - name: Check for tabs in CMake files
        run: |
          echo "=== Checking for tabs in CMake files ==="

          files_with_tabs=0
          find cmake/tebako -name "*.cmake" -type f | while read file; do
            if grep -P '\t' "$file"; then
              echo "✗ Tabs found in $file (use spaces for indentation)"
              files_with_tabs=$((files_with_tabs + 1))
            fi
          done

          if [ $files_with_tabs -eq 0 ]; then
            echo "✓ No tabs found in CMake files"
          else
            echo "✗ Found tabs in $files_with_tabs file(s)"
            exit 1
          fi

      - name: Check line endings
        run: |
          echo "=== Checking line endings (should be LF) ==="

          files_with_crlf=0
          find cmake/tebako -name "*.cmake" -type f -exec file {} \; | grep CRLF && {
            echo "✗ CRLF line endings found (should be LF)"
            files_with_crlf=1
          } || {
            echo "✓ All files use LF line endings"
          }

          exit $files_with_crlf

  validation:
    name: Validate tebako structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "=== Checking for required tebako files ==="

          required_files=(
            "cmake/tebako.cmake"
            "cmake/tebako/build_scopes.cmake"
            "cmake/tebako/platform_detection.cmake"
            "cmake/tebako/dependency_paths.cmake"
            "cmake/tebako/compiler_flags.cmake"
            "cmake/tebako/validation.cmake"
            "TEBAKO_README.md"
            "CONTRIBUTING_TEBAKO.md"
          )

          missing_files=0
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            else
              echo "✗ $file is missing"
              missing_files=$((missing_files + 1))
            fi
          done

          if [ $missing_files -gt 0 ]; then
            echo "✗ Missing $missing_files required file(s)"
            exit 1
          fi

          echo "✓ All required files present"

      - name: Validate CMake module structure
        run: |
          echo "=== Validating CMake module structure ==="

          # Check that main tebako.cmake includes all modules
          required_includes=(
            "build_scopes"
            "platform_detection"
            "dependency_paths"
            "compiler_flags"
            "validation"
          )

          missing_includes=0
          for module in "${required_includes[@]}"; do
            if grep -q "include.*${module}" cmake/tebako.cmake; then
              echo "✓ ${module}.cmake is included"
            else
              echo "✗ ${module}.cmake is not included in tebako.cmake"
              missing_includes=$((missing_includes + 1))
            fi
          done

          if [ $missing_includes -gt 0 ]; then
            echo "✗ Missing $missing_includes module include(s)"
            exit 1
          fi

          echo "✓ All modules properly included"