---
name: Tebako Builds

on:
  workflow_call:

permissions:
  contents: read

jobs:
  tebako-ubuntu:
    name: Tebako Ubuntu - ${{ matrix.arch }} - ${{ matrix.compiler }} - ${{ matrix.scope }}
    runs-on: ${{ matrix.host }}
    container:
      image: 'ghcr.io/${{ github.repository_owner }}/tebako-${{ matrix.os }}-dev'
      options: --privileged

    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-22.04
            arch: amd64
            os: ubuntu-20.04
            compiler: gcc-10
            scope: ALL
            tests: 'ON'

          - host: ubuntu-22.04
            arch: amd64
            os: ubuntu-20.04
            compiler: clang-12
            scope: MKD
            tests: 'OFF'

          - host: ubuntu-22.04-arm
            arch: arm64
            os: ubuntu-20.04
            compiler: gcc-10
            scope: ALL
            tests: 'ON'

    env:
      CC: ${{ matrix.compiler }}
      CXX: ${{ matrix.compiler == 'gcc-10' && 'g++-10' || 'clang++-12' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install FUSE3
        if: matrix.scope == 'ALL'
        run: apt-get update && apt-get install -y libfuse3-dev fuse3

      - name: Install Build Tools
        run: apt-get install -y ninja-build git

      - name: Configure
        run: |
          cmake -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTEBAKO_BUILD=ON \
            -DTEBAKO_BUILD_SCOPE=${{ matrix.scope }} \
            -DWITH_TESTS=${{ matrix.tests }} \
            -DWITH_FUSE_DRIVER=${{ matrix.scope == 'ALL' && 'ON' || 'OFF' }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        if: matrix.tests == 'ON'
        run: ctest --test-dir build --output-on-failure

  tebako-macos:
    name: Tebako macOS - ${{ matrix.xcode }} - ${{ matrix.scope }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            xcode: '15.0.1'
            scope: ALL
            tests: 'ON'

          - os: macos-14
            xcode: '15.4'
            scope: MKD
            tests: 'OFF'

    steps:
      - name: Select XCode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          brew install ninja boost libarchive

      - name: Configure
        run: |
          cmake -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTEBAKO_BUILD=ON \
            -DTEBAKO_BUILD_SCOPE=${{ matrix.scope }} \
            -DWITH_TESTS=${{ matrix.tests }} \
            -DWITH_FUSE_DRIVER=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        if: matrix.tests == 'ON'
        run: ctest --test-dir build --output-on-failure

  tebako-alpine:
    name: Tebako Alpine - ${{ matrix.arch }} - ${{ matrix.compiler }} - ${{ matrix.scope }}
    runs-on: ubuntu-latest
    container:
      image: 'ghcr.io/${{ github.repository_owner }}/tebako-${{ matrix.os }}-dev'
      options: --privileged

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: alpine-3.17
            compiler: gcc
            scope: ALL
            tests: 'ON'

          - arch: amd64
            os: alpine-3.17
            compiler: clang
            scope: MKD
            tests: 'OFF'

    env:
      CC: ${{ matrix.compiler }}
      CXX: ${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install FUSE3
        if: matrix.scope == 'ALL'
        run: apk add --no-cache fuse3 fuse3-dev

      - name: Install Build Tools
        run: apk add --no-cache ninja git

      - name: Configure
        run: |
          cmake -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTEBAKO_BUILD=ON \
            -DTEBAKO_BUILD_SCOPE=${{ matrix.scope }} \
            -DWITH_TESTS=${{ matrix.tests }} \
            -DWITH_FUSE_DRIVER=${{ matrix.scope == 'ALL' && 'ON' || 'OFF' }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        if: matrix.tests == 'ON'
        run: ctest --test-dir build --output-on-failure