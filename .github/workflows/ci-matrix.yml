# Full CI Matrix Workflow
#
# Comprehensive cross-platform testing across all supported triplets.
# Tests Linux, macOS, and Windows with multiple configurations.
#
# Use this for:
# - PR validation (comprehensive testing across all platforms)
# - Pre-release validation
# - Manual cross-platform verification (workflow_dispatch)
# - Comprehensive testing (push to main)
#
# Platform Coverage:
# - Linux: x64 (static/dynamic), ARM64 (static), experimental variants
# - macOS: x64 (static/dynamic), ARM64 (static/dynamic), experimental variant
# - Windows: x64 (static/dynamic/MSYS/MinGW), ARM64 (static)

name: CI Matrix

on:
  pull_request:
    branches: [main, feature/*]
  push:
    branches: [main]
    paths-ignore:
      - '.benchmark/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.gitignore'
      - '.maintainer-scripts/**'
      - 'CHANGES.md'
      - 'CITATION.cff'
      - 'doc/**'
      - 'TODO'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform filter'
        required: false
        type: choice
        options: ['all', 'linux', 'macos', 'windows']
        default: 'all'

concurrency:
  group: ci-matrix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ========================================================================
  # Linux Jobs
  # ========================================================================
  linux-x64-production:
    if: contains(github.event.inputs.platform || 'all', 'linux') || github.event_name == 'push'
    name: 📦 Linux · x64 · Production
    uses: ./.github/workflows/_build.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: production
      vcpkg-manifest: vcpkg-production.json

  linux-x64-experimental:
    if: (contains(github.event.inputs.platform || 'all', 'linux') || github.event_name == 'push')
    name: 🧪 Linux · x64 · Experimental
    uses: ./.github/workflows/_build.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: experimental
      vcpkg-manifest: vcpkg-experimental.json
      continue-on-error: true  # Experimental may fail

  linux-x64-dynamic-production:
    if: contains(github.event.inputs.platform || 'all', 'linux') || github.event_name == 'push'
    name: 🔧 Linux · x64 · Dynamic
    uses: ./.github/workflows/_build.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux-dynamic
      config: production
      vcpkg-manifest: vcpkg-production.json

  linux-x64-dynamic-experimental:
    if: contains(github.event.inputs.platform || 'all', 'linux') || github.event_name == 'push'
    name: 🧪 Linux · x64 · Dynamic · Experimental
    uses: ./.github/workflows/_build.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux-dynamic
      config: experimental
      vcpkg-manifest: vcpkg-experimental.json
      continue-on-error: true  # Experimental may fail

  linux-arm64-production:
    if: contains(github.event.inputs.platform || 'all', 'linux') || github.event_name == 'push'
    name: 📦 Linux · ARM64 · Production
    uses: ./.github/workflows/_build.yml
    with:
      runner: ubuntu-24.04-arm64
      triplet: arm64-linux
      config: production
      vcpkg-manifest: vcpkg-production.json

  linux-arm64-experimental:
    if: contains(github.event.inputs.platform || 'all', 'linux') || github.event_name == 'push'
    name: 🧪 Linux · ARM64 · Experimental
    uses: ./.github/workflows/_build.yml
    with:
      runner: ubuntu-24.04-arm64
      triplet: arm64-linux
      config: experimental
      vcpkg-manifest: vcpkg-experimental.json
      continue-on-error: true  # Experimental may fail

  # ========================================================================
  # macOS Jobs
  # ========================================================================
  macos-x64-production:
    if: contains(github.event.inputs.platform || 'all', 'macos') || github.event_name == 'push'
    name: 🍎 macOS · x64 · Production
    uses: ./.github/workflows/_build.yml
    with:
      runner: macos-13
      triplet: x64-osx
      config: production
      vcpkg-manifest: vcpkg-production.json

  macos-x64-dynamic-production:
    if: contains(github.event.inputs.platform || 'all', 'macos') || github.event_name == 'push'
    name: 🔧 macOS · x64 · Dynamic
    uses: ./.github/workflows/_build.yml
    with:
      runner: macos-13
      triplet: x64-osx-dynamic
      config: production
      vcpkg-manifest: vcpkg-production.json

  macos-arm64-production:
    if: contains(github.event.inputs.platform || 'all', 'macos') || github.event_name == 'push'
    name: 🍎 macOS · ARM64 · Production
    uses: ./.github/workflows/_build.yml
    with:
      runner: macos-latest
      triplet: arm64-osx
      config: production
      vcpkg-manifest: vcpkg-production.json

  macos-arm64-experimental:
    if: contains(github.event.inputs.platform || 'all', 'macos') || github.event_name == 'push'
    name: 🧪 macOS · ARM64 · Experimental
    uses: ./.github/workflows/_build.yml
    with:
      runner: macos-latest
      triplet: arm64-osx
      config: experimental
      vcpkg-manifest: vcpkg-experimental.json
      continue-on-error: true  # Experimental may fail

  macos-arm64-dynamic-production:
    if: contains(github.event.inputs.platform || 'all', 'macos') || github.event_name == 'push'
    name: 🔧 macOS · ARM64 · Dynamic
    uses: ./.github/workflows/_build.yml
    with:
      runner: macos-latest
      triplet: arm64-osx-dynamic
      config: production
      vcpkg-manifest: vcpkg-production.json

  # ========================================================================
  # Windows Jobs
  # ========================================================================
  windows-x64-static-production:
    if: contains(github.event.inputs.platform || 'all', 'windows') || github.event_name == 'push'
    name: 🪟 Windows · x64 · Static
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: x64-windows-static
      config: production
      vcpkg-manifest: vcpkg-production.json

  windows-x64-dynamic-production:
    if: contains(github.event.inputs.platform || 'all', 'windows') || github.event_name == 'push'
    name: 🔧 Windows · x64 · Dynamic
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: x64-windows-dynamic
      config: production
      vcpkg-manifest: vcpkg-production.json

  windows-x64-msys-production:
    if: contains(github.event.inputs.platform || 'all', 'windows') || github.event_name == 'push'
    name: 🔧 Windows · x64 · MSYS
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: x64-windows-msys
      config: production
      vcpkg-manifest: vcpkg-production.json

  windows-x64-mingw-production:
    if: contains(github.event.inputs.platform || 'all', 'windows') || github.event_name == 'push'
    name: 🔧 Windows · x64 · MinGW
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: x64-windows-mingw
      config: production
      vcpkg-manifest: vcpkg-production.json

  windows-arm64-static-production:
    if: contains(github.event.inputs.platform || 'all', 'windows') || github.event_name == 'push'
    name: 🪟 Windows · ARM64 · Static
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: arm64-windows-static
      config: production
      vcpkg-manifest: vcpkg-production.json

  # ========================================================================
  # Summary
  # ========================================================================
  summary:
    name: 📊 Summary
    needs:
      - linux-x64-production
      - linux-x64-experimental
      - linux-x64-dynamic-production
      - linux-x64-dynamic-experimental
      - linux-arm64-production
      - linux-arm64-experimental
      - macos-x64-production
      - macos-x64-dynamic-production
      - macos-arm64-production
      - macos-arm64-experimental
      - macos-arm64-dynamic-production
      - windows-x64-static-production
      - windows-x64-dynamic-production
      - windows-x64-msys-production
      - windows-x64-mingw-production
      - windows-arm64-static-production
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📊 Results
        run: |
          echo "# CI Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🐧 Linux" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| x64 Production | ${{ needs.linux-x64-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64 Experimental | ${{ needs.linux-x64-experimental.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64 Dynamic | ${{ needs.linux-x64-dynamic-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64 Dynamic Exp | ${{ needs.linux-x64-dynamic-experimental.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ARM64 Production | ${{ needs.linux-arm64-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ARM64 Experimental | ${{ needs.linux-arm64-experimental.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🍎 macOS" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| x64 Production | ${{ needs.macos-x64-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64 Dynamic | ${{ needs.macos-x64-dynamic-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ARM64 Production | ${{ needs.macos-arm64-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ARM64 Experimental | ${{ needs.macos-arm64-experimental.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ARM64 Dynamic | ${{ needs.macos-arm64-dynamic-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🪟 Windows" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| x64 Static | ${{ needs.windows-x64-static-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64 Dynamic | ${{ needs.windows-x64-dynamic-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64 MSYS | ${{ needs.windows-x64-msys-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64 MinGW | ${{ needs.windows-x64-mingw-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ARM64 Static | ${{ needs.windows-arm64-static-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count results
          total=17
          success=0
          failed=0
          skipped=0
          for result in \
            "${{ needs.linux-x64-production.result }}" \
            "${{ needs.linux-x64-experimental.result }}" \
            "${{ needs.linux-x64-dynamic-production.result }}" \
            "${{ needs.linux-x64-dynamic-experimental.result }}" \
            "${{ needs.linux-arm64-production.result }}" \
            "${{ needs.linux-arm64-experimental.result }}" \
            "${{ needs.macos-x64-production.result }}" \
            "${{ needs.macos-x64-dynamic-production.result }}" \
            "${{ needs.macos-arm64-production.result }}" \
            "${{ needs.macos-arm64-experimental.result }}" \
            "${{ needs.macos-arm64-dynamic-production.result }}" \
            "${{ needs.windows-x64-static-production.result }}" \
            "${{ needs.windows-x64-dynamic-production.result }}" \
            "${{ needs.windows-x64-msys-production.result }}" \
            "${{ needs.windows-x64-mingw-production.result }}" \
            "${{ needs.windows-arm64-static-production.result }}"; do
            if [ "$result" == "success" ]; then
              ((success++))
            elif [ "$result" == "failure" ]; then
              ((failed++))
            else
              ((skipped++))
            fi
          done
          echo "**Summary:** $success/$total passed, $failed failed, $skipped skipped" >> $GITHUB_STEP_SUMMARY
