# CI Matrix - Comprehensive Testing Across All Platforms
#
# This workflow runs comprehensive tests across ALL supported triplets.
# Uses CMakePresets.json for consistent, cache-friendly builds.
#
# IMPORTANT: This is a HEAVY workflow. Use pr-validation.yml or ci-main.yml
# for faster feedback during development.
#
# Estimated Runtime: 4-6 hours on first run (warm cache: 60-120 min)
# Total Jobs: 18 (7 Linux, 4 macOS, 7 Windows)
#
# Runner Mappings:
# - ARM64 Linux: ubuntu-24.04-arm (larger runner, requires proper labeling)
# - x64 Linux: ubuntu-24.04 or ubuntu-latest
# - ARM64 macOS: macos-15 (Apple Silicon, default)
# - x64 macOS: macos-13 (Intel, last Intel macOS version)
# - ARM64 Windows: windows-11-arm (requires windows-11-arm label)
# - x64 Windows: windows-2025 or windows-latest
#
# Note: ubuntu-24.04-arm requires GitHub Actions larger runners (ARM)
# Note: macos-15-intel may not be available, use macos-13 for Intel
#
# Concurrency: Each platform/architecture combination runs independently
# Failures: fail-fast: false ensures one failure doesn't stop other jobs

name: CI Matrix

on:
  push:
    branches: [main]
    paths-ignore:
      - '.benchmark/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.gitignore'
      - '.maintainer-scripts/**'
      - 'CHANGES.md'
      - 'CITATION.cff'
      - 'doc/**'
  workflow_dispatch:

concurrency:
  group: ci-matrix-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel matrix jobs

permissions:
  contents: read

jobs:
  # ==========================================================================
  # Build and Test Matrix
  # ==========================================================================

  build-and-test:
    name: ${{ matrix.os }} ${{ matrix.triplet }} ${{ matrix.config }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true  # Don't stop other jobs if one fails

    strategy:
      fail-fast: false  # One failure shouldn't stop other jobs
      matrix:
        # ==========================================================================
        # Linux Jobs (ubuntu-24.04-arm [larger] and ubuntu-latest)
        # ==========================================================================
        - os: linux
          runner: ubuntu-24.04-arm
          triplet: arm64-linux
          config: production

        - os: linux
          runner: ubuntu-latest
          triplet: x64-linux
          config: production

        - os: linux
          runner: ubuntu-latest
          triplet: x64-linux
          config: experimental

        - os: linux
          runner: ubuntu-latest
          triplet: x64-linux-dynamic
          config: production

        - os: linux
          runner: ubuntu-latest
          triplet: x64-linux-release-dbg
          config: production

        - os: linux
          runner: ubuntu-latest
          triplet: x64-linux-musl
          config: production

        # ==========================================================================
        # macOS Jobs (macos-13 [Intel] and macos-latest [ARM])
        # ==========================================================================
        - os: macos
          runner: macos-13
          triplet: x64-osx
          config: production

        - os: macos
          runner: macos-13
          triplet: x64-osx-dynamic
          config: production

        - os: macos
          runner: macos-latest
          triplet: arm64-osx
          config: production

        - os: macos
          runner: macos-latest
          triplet: arm64-osx-dynamic
          config: production

        # ==========================================================================
        # Windows Jobs (windows-latest and windows-11-arm)
        # ==========================================================================
        - os: windows
          runner: windows-latest
          triplet: x64-windows
          config: production

        - os: windows
          runner: windows-latest
          triplet: x64-windows-dynamic
          config: production

        - os: windows
          runner: windows-latest
          triplet: x64-windows-static
          config: production

        - os: windows
          runner: windows-latest
          triplet: x64-windows-static-md
          config: production

        - os: windows
          runner: windows-latest
          triplet: x64-windows-msys
          config: production

        - os: windows
          runner: windows-latest
          triplet: x64-windows-mingw
          config: production

        - os: windows
          runner: windows-11-arm
          triplet: arm64-windows-static
          config: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup vcpkg (production)
        if: matrix.config == 'production'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 7c11b72a6f810293d0ce234de126b99e9ab6fa7a
          vcpkgJsonGlob: '**/vcpkg-production.json'
          vcpkgDirectory: '${{ github.workspace }}/../vcpkg'

      - name: Setup vcpkg (experimental)
        if: matrix.config == 'experimental'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 7c11b72a6f810293d0ce234de126b99e9ab6fa7a
          vcpkgJsonGlob: '**/vcpkg-experimental.json'
          vcpkgDirectory: '${{ github.workspace }}/../vcpkg'

      - name: Set environment variables
        run: |
          echo "VCPKG_DEFAULT_TRIPLET=${{ matrix.triplet }}" >> $GITHUB_ENV
          echo "VCPKG_OVERLAY_PORTS=$GITHUB_WORKSPACE/vcpkg_ports" >> $GITHUB_ENV
          echo "VCPKG_OVERLAY_TRIPLETS=$GITHUB_WORKSPACE/vcpkg_triplets" >> $GITHUB_ENV
          echo "✓ Triplet: ${{ matrix.triplet }}"
          echo "✓ Config: ${{ matrix.config }}"
          echo "✓ Binary cache: enabled (GitHub Actions cache via x-gha)"

      - name: Setup build dependencies
        uses: ./.github/actions/setup-build-deps

      - name: Configure, Build, and Test
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.triplet }}-${{ matrix.config }}
          buildPreset: ${{ matrix.triplet }}-${{ matrix.config }}
          testPreset: ${{ matrix.triplet }}-${{ matrix.config }}

      - name: Generate Test Report
        if: always()
        run: |
          echo "## Test Report for ${{ matrix.os }} ${{ matrix.triplet }} ${{ matrix.config }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **OS**: ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triplet**: ${{ matrix.triplet }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Config**: ${{ matrix.config }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner**: ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.triplet }}-${{ matrix.config }}
          path: |
            **/Testing/
            **/test-results/
            **/CTestResults.xml
          if-no-files-found: ignore

      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.os }}-${{ matrix.triplet }}-${{ matrix.config }}
          path: |
            **/CMakeFiles/CMakeOutput.log
            **/CMakeFiles/CMakeError.log
            **/build.ninja.log
          if-no-files-found: ignore

      - name: Upload Compiled Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dwarfs-${{ matrix.triplet }}-${{ matrix.config }}
          path: |
            build-${{ matrix.triplet }}-${{ matrix.config }}/tools/mkdwarfs/
            build-${{ matrix.triplet }}-${{ matrix.config }}/tools/dwarfs/
            build-${{ matrix.triplet }}-${{ matrix.config }}/tools/dwarfsextract/
            build-${{ matrix.triplet }}-${{ matrix.config }}/tools/dwarfsck/
            build-${{ matrix.triplet }}-${{ matrix.config }}/libdwarfs/
          retention-days: 30
          if-no-files-found: warn

      - name: List Uploaded Artifacts
        if: success()
        run: |
          echo "### Uploaded Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact**: dwarfs-${{ matrix.triplet }}-${{ matrix.config }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Contents**:" >> $GITHUB_STEP_SUMMARY
          echo "- mkdwarfs (filesystem image creator)" >> $GITHUB_STEP_SUMMARY
          echo "- dwarfs (FUSE filesystem driver)" >> $GITHUB_STEP_SUMMARY
          echo "- dwarfsextract (archive extractor)" >> $GITHUB_STEP_SUMMARY
          echo "- dwarfsck (filesystem checker)" >> $GITHUB_STEP_SUMMARY
          echo "- libdwarfs (library files)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Retention**: 30 days" >> $GITHUB_STEP_SUMMARY

      # ==========================================================================
      # Benchmark Execution (runs after successful tests)
      # ==========================================================================

      - name: Run Benchmarks (Linux/macOS)
        if: success() && (runner.os == 'Linux' || runner.os == 'macOS')
        shell: bash
        run: |
          BUILD_DIR="build-${{ matrix.triplet }}-${{ matrix.config }}"
          BENCH_DIR="$BUILD_DIR/benchmark-results"
          mkdir -p "$BENCH_DIR"

          echo "### Running Benchmarks for ${{ matrix.triplet }}-${{ matrix.config }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Find all benchmark executables and run them
          for bench in "$BUILD_DIR"/dwarfs_*_benchmark "$BUILD_DIR"/*_benchmark; do
            if [ -f "$bench" ] && [ -x "$bench" ]; then
              bench_name=$(basename "$bench")
              echo "Running: $bench_name" >> $GITHUB_STEP_SUMMARY

              # Run benchmark with JSON output
              if "$bench" --benchmark_format=json --benchmark_out="$BENCH_DIR/${bench_name}.json" 2>&1; then
                echo "  ✓ Completed: $bench_name" >> $GITHUB_STEP_SUMMARY
              else
                echo "  ⚠ Failed or not available: $bench_name" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Benchmark results saved to**: \`$BENCH_DIR\`" >> $GITHUB_STEP_SUMMARY

      - name: Run Benchmarks (Windows)
        if: success() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $BUILD_DIR = "build-${{ matrix.triplet }}-${{ matrix.config }}"
          $BENCH_DIR = "$BUILD_DIR\benchmark-results"
          New-Item -ItemType Directory -Force -Path $BENCH_DIR | Out-Null

          "### Running Benchmarks for ${{ matrix.triplet }}-${{ matrix.config }}" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY

          # Find all benchmark executables and run them
          Get-ChildItem -Path "$BUILD_DIR" -Filter "*_benchmark.exe" | ForEach-Object {
            $bench = $_.FullName
            $bench_name = $_.BaseName

            if (Test-Path $bench) {
              "Running: $bench_name" >> $env:GITHUB_STEP_SUMMARY

              # Run benchmark with JSON output
              $output = "$BENCH_DIR\${bench_name}.json"
              & $bench --benchmark_format=json --benchmark_out=$output 2>&1

              if ($LASTEXITCODE -eq 0) {
                "  ✓ Completed: $bench_name" >> $env:GITHUB_STEP_SUMMARY
              } else {
                "  ⚠ Failed or not available: $bench_name" >> $env:GITHUB_STEP_SUMMARY
              }
            }
          }

          "" >> $env:GITHUB_STEP_SUMMARY
          "**Benchmark results saved to**: `$BENCH_DIR`" >> $env:GITHUB_STEP_SUMMARY

      - name: Upload Benchmark Results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.os }}-${{ matrix.triplet }}-${{ matrix.config }}
          path: |
            build-${{ matrix.triplet }}-${{ matrix.config }}/benchmark-results/
          retention-days: 30
          if-no-files-found: ignore

  # ==========================================================================
  # Summary Job - Aggregates all results
  # ==========================================================================

  summary:
    name: CI Matrix Summary
    needs: build-and-test
    # Only run after all matrix jobs complete (or fail)
    if: always() && needs.build-and-test.result != 'skipped'
    runs-on: ubuntu-latest

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: test-results
        continue-on-error: true

      - name: Generate comprehensive summary
        run: |
          echo "## CI Matrix Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Platform Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Architecture | Runner | Triplets |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------------|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | ARM64 | ubuntu-24.04-arm | arm64-linux |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | x64 | ubuntu-latest | x64-linux, x64-linux-dynamic, x64-linux-release-dbg, x64-linux-musl |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | ARM64 | macos-latest | arm64-osx, arm64-osx-dynamic |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | x64 | macos-13 | x64-osx, x64-osx-dynamic |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | ARM64 | windows-11-arm | arm64-windows-static |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | x64 | windows-latest | x64-windows, x64-windows-dynamic, x64-windows-static, x64-windows-static-md, x64-windows-msys, x64-windows-mingw |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count total jobs
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get job results from needs
          RESULTS="${{ needs.build-and-test.result }}"
          echo "Overall Status: $RESULTS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: List Available Artifacts
        run: |
          echo "### Available Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following compiled artifacts are available for download:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Triplet | Config | Artifact Name |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|---------------|" >> $GITHUB_STEP_SUMMARY
          echo "| arm64-linux | production | dwarfs-arm64-linux-production |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-linux | production | dwarfs-x64-linux-production |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-linux | experimental | dwarfs-x64-linux-experimental |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-linux-dynamic | production | dwarfs-x64-linux-dynamic-production |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-linux-release-dbg | production | dwarfs-x64-linux-release-dbg-production |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-linux-musl | production | dwarfs-x64-linux-musl-production |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-osx | production | dwarfs-x64-osx-production |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-osx-dynamic | production | dwarfs-x64-osx-dynamic-production |" >> $GITHUB_STEP_SUMMARY
          echo "| arm64-osx | production | dwarfs-arm64-osx-production |" >> $GITHUB_STEP_SUMMARY
          echo "| arm64-osx-dynamic | production | dwarfs-arm64-osx-dynamic-production |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-windows | production | dwarfs-x64-windows-production |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-windows-dynamic | production | dwarfs-x64-windows-dynamic-production |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-windows-static | production | dwarfs-x64-windows-static-production |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-windows-static-md | production | dwarfs-x64-windows-static-md-production |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-windows-msys | production | dwarfs-x64-windows-msys-production |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-windows-mingw | production | dwarfs-x64-windows-mingw-production |" >> $GITHUB_STEP_SUMMARY
          echo "| arm64-windows-static | production | dwarfs-arm64-windows-static-production |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note**: Artifacts are retained for 30 days." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-results-*
          path: benchmark-results
        continue-on-error: true

      - name: List Benchmark Results
        run: |
          echo "### Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d "benchmark-results" ] && [ "$(ls -A benchmark-results)" ]; then
            echo "The following benchmark results are available for download:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # List all benchmark result artifacts
            for dir in benchmark-results/benchmark-results-*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                echo "- \`${dirname}\`" >> $GITHUB_STEP_SUMMARY
              fi
            done

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Benchmarks run**:" >> $GITHUB_STEP_SUMMARY
            echo "- dwarfs_benchmark - Core DwarFS performance benchmarks" >> $GITHUB_STEP_SUMMARY
            echo "- segmenter_benchmark - Segmentation algorithm benchmarks" >> $GITHUB_STEP_SUMMARY
            echo "- dwarfs_compression_benchmark - Compression algorithm comparison" >> $GITHUB_STEP_SUMMARY
            echo "- libdwarfs_benchmarks - API performance benchmarks" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Note**: Benchmark results are retained for 30 days." >> $GITHUB_STEP_SUMMARY
          else
            echo "No benchmark results available. Benchmarks may have been skipped or failed." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        run: |
          if [[ "${{ needs.build-and-test.result }}" == "failure" ]]; then
            echo "::error::Some matrix jobs failed. Check individual job logs for details."
            exit 1
          fi
