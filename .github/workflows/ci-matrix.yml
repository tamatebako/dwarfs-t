# CI Matrix - Comprehensive Testing Across All Platforms
#
# This workflow runs comprehensive tests across ALL supported triplets.
# It provides maximum coverage but takes longer to complete.
#
# IMPORTANT: This is a HEAVY workflow. Use pr-validation.yml or ci-main.yml
# for faster feedback during development.
#
# Estimated Runtime: 2-4 hours depending on GitHub Actions queue

name: CI Matrix

on:
  push:
    branches: [main]
    paths-ignore:
      - '.benchmark/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.gitignore'
      - '.maintainer-scripts/**'
      - 'CHANGES.md'
      - 'CITATION.cff'
      - 'doc/**'
      # Keep markdown docs that might affect CI
      # - '*.md'
  workflow_dispatch:

concurrency:
  group: ci-matrix-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel matrix jobs

permissions:
  contents: read
  packages: write  # Required for vcpkg binary cache

jobs:
  # ==========================================================================
  # Primary Tests (High Priority)
  # ==========================================================================

  test-linux-x64-production:
    name: Linux x64 - Production
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: production
      build-type: Release
      cache-key: ci-matrix-linux-x64-prod

  test-linux-x64-experimental:
    name: Linux x64 - Experimental
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: experimental
      build-type: Release
      cache-key: ci-matrix-linux-x64-exp

  # ==========================================================================
  # macOS Tests
  # ==========================================================================

  test-macos-x64:
    name: macOS x64 - Production
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-13
      triplet: x64-osx
      config: production
      build-type: Release
      cache-key: ci-matrix-macos-x64

  test-macos-arm64:
    name: macOS ARM64 - Production
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-latest
      triplet: arm64-osx
      config: production
      build-type: Release
      cache-key: ci-matrix-macos-arm64

  # ==========================================================================
  # Windows Tests
  # ==========================================================================

  test-windows-x64:
    name: Windows x64 - Production
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: windows-latest
      triplet: x64-windows-static
      config: production
      build-type: Release
      cache-key: ci-matrix-windows-x64

  # ==========================================================================
  # Summary Job
  # ==========================================================================

  summary:
    name: CI Matrix Summary
    needs:
      - test-linux-x64-production
      - test-linux-x64-experimental
      - test-macos-x64
      - test-macos-arm64
      - test-windows-x64
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "=== CI Matrix Workflow Summary ==="
          echo ""
          echo "Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "Run: ${{ github.run_number }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "Job Status:"
          echo "  Linux x64 Production: ${{ needs.test-linux-x64-production.result }}"
          echo "  Linux x64 Experimental: ${{ needs.test-linux-x64-experimental.result }}"
          echo "  macOS x64: ${{ needs.test-macos-x64.result }}"
          echo "  macOS ARM64: ${{ needs.test-macos-arm64.result }}"
          echo "  Windows x64: ${{ needs.test-windows-x64.result }}"
          echo ""

          # Count passed/failed
          JOBS=(
            "${{ needs.test-linux-x64-production.result }}"
            "${{ needs.test-linux-x64-experimental.result }}"
            "${{ needs.test-macos-x64.result }}"
            "${{ needs.test-macos-arm64.result }}"
            "${{ needs.test-windows-x64.result }}"
          )

          PASSED=0
          FAILED=0
          SKIPPED=0

          for job in "${JOBS[@]}"; do
            if [[ "$job" == "success" ]]; then
              ((PASSED++))
            elif [[ "$job" == "failure" ]]; then
              ((FAILED++))
            elif [[ "$job" == "skipped" ]]; then
              ((SKIPPED++))
            fi
          done

          echo "Results: $PASSED passed, $FAILED failed, $SKIPPED skipped"
          echo ""

          if [[ $FAILED -gt 0 ]]; then
            echo "::error::$FAILED job(s) failed"
            exit 1
          fi

      - name: Create summary report
        if: always()
        run: |
          echo "## CI Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Configuration | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64 | Production | ${{ needs.test-linux-x64-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64 | Experimental | ${{ needs.test-linux-x64-experimental.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS x64 | Production | ${{ needs.test-macos-x64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS ARM64 | Production | ${{ needs.test-macos-arm64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows x64 | Production | ${{ needs.test-windows-x64.result }} |" >> $GITHUB_STEP_SUMMARY
