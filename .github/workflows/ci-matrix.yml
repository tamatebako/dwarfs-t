# CI Matrix - Comprehensive Testing Across All Platforms
#
# This workflow runs comprehensive tests across ALL supported triplets.
# Uses CMakePresets.json for consistent, cache-friendly builds.
#
# IMPORTANT: This is a HEAVY workflow. Use pr-validation.yml or ci-main.yml
# for faster feedback during development.
#
# Estimated Runtime: 3-5 hours on first run (warm cache: 45-90 min)
# Total Jobs: 15 (6 Linux, 4 macOS, 5 Windows)

name: CI Matrix

on:
  push:
    branches: [main]
    paths-ignore:
      - '.benchmark/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.gitignore'
      - '.maintainer-scripts/**'
      - 'CHANGES.md'
      - 'CITATION.cff'
      - 'doc/**'
  workflow_dispatch:

concurrency:
  group: ci-matrix-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel matrix jobs

permissions:
  contents: read

jobs:
  # ==========================================================================
  # Primary Tests (High Priority)
  # ==========================================================================

  # Linux x64 - Production (FlatBuffers + Legacy Thrift)
  test-x64-linux-production:
    name: Linux x64 - Production
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: production

  # Linux x64 - Experimental (+ Modern Thrift)
  test-x64-linux-experimental:
    name: Linux x64 - Experimental
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: experimental

  # Linux x64 - Dynamic build
  test-x64-linux-dynamic-production:
    name: Linux x64 - Dynamic
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux-dynamic
      config: production

  # Linux x64 - Release with Debug info
  test-x64-linux-release-dbg-production:
    name: Linux x64 - RelWithDebInfo
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux-release-dbg
      config: production

  # Linux x64 - Alpine (musl)
  test-x64-linux-musl-production:
    name: Linux x64 - Alpine (musl)
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux-musl
      config: production

  # Linux ARM64 - Production
  test-arm64-linux-production:
    name: Linux ARM64 - Production
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: arm64-linux
      config: production

  # ==========================================================================
  # macOS Tests
  # ==========================================================================

  # macOS x64 - Production
  test-x64-osx-production:
    name: macOS x64 - Production
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-13
      triplet: x64-osx
      config: production

  # macOS x64 - Dynamic
  test-x64-osx-dynamic-production:
    name: macOS x64 - Dynamic
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-13
      triplet: x64-osx-dynamic
      config: production

  # macOS ARM64 - Production
  test-arm64-osx-production:
    name: macOS ARM64 - Production
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-latest
      triplet: arm64-osx
      config: production

  # macOS ARM64 - Dynamic
  test-arm64-osx-dynamic-production:
    name: macOS ARM64 - Dynamic
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-latest
      triplet: arm64-osx-dynamic
      config: production

  # ==========================================================================
  # Windows Tests
  # ==========================================================================

  # Windows x64 - Production
  test-x64-windows-production:
    name: Windows x64 - Production
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: windows-latest
      triplet: x64-windows
      config: production

  # Windows x64 - Dynamic
  test-x64-windows-dynamic-production:
    name: Windows x64 - Dynamic
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: windows-latest
      triplet: x64-windows-dynamic
      config: production

  # Windows x64 - Static
  test-x64-windows-static-production:
    name: Windows x64 - Static
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: windows-latest
      triplet: x64-windows-static
      config: production

  # Windows x64 - Static MD
  test-x64-windows-static-md-production:
    name: Windows x64 - Static MD
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: windows-latest
      triplet: x64-windows-static-md
      config: production

  # Windows ARM64 - Static
  test-arm64-windows-static-production:
    name: Windows ARM64 - Static
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: windows-latest
      triplet: arm64-windows-static
      config: production

  # ==========================================================================
  # Summary Job
  # ==========================================================================

  summary:
    name: CI Matrix Summary
    needs:
      - test-x64-linux-production
      - test-x64-linux-experimental
      - test-x64-linux-dynamic-production
      - test-x64-linux-release-dbg-production
      - test-x64-linux-musl-production
      - test-arm64-linux-production
      - test-x64-osx-production
      - test-x64-osx-dynamic-production
      - test-arm64-osx-production
      - test-arm64-osx-dynamic-production
      - test-x64-windows-production
      - test-x64-windows-dynamic-production
      - test-x64-windows-static-production
      - test-x64-windows-static-md-production
      - test-arm64-windows-static-production
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "=== CI Matrix Workflow Summary ==="
          echo ""
          echo "Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "Run: ${{ github.run_number }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "Linux:"
          echo "  x64 Production: ${{ needs.test-x64-linux-production.result }}"
          echo "  x64 Experimental: ${{ needs.test-x64-linux-experimental.result }}"
          echo "  x64 Dynamic: ${{ needs.test-x64-linux-dynamic-production.result }}"
          echo "  x64 RelWithDebInfo: ${{ needs.test-x64-linux-release-dbg-production.result }}"
          echo "  x64 Alpine (musl): ${{ needs.test-x64-linux-musl-production.result }}"
          echo "  ARM64 Production: ${{ needs.test-arm64-linux-production.result }}"
          echo ""
          echo "macOS:"
          echo "  x64 Production: ${{ needs.test-x64-osx-production.result }}"
          echo "  x64 Dynamic: ${{ needs.test-x64-osx-dynamic-production.result }}"
          echo "  ARM64 Production: ${{ needs.test-arm64-osx-production.result }}"
          echo "  ARM64 Dynamic: ${{ needs.test-arm64-osx-dynamic-production.result }}"
          echo ""
          echo "Windows:"
          echo "  x64 Production: ${{ needs.test-x64-windows-production.result }}"
          echo "  x64 Dynamic: ${{ needs.test-x64-windows-dynamic-production.result }}"
          echo "  x64 Static: ${{ needs.test-x64-windows-static-production.result }}"
          echo "  x64 Static MD: ${{ needs.test-x64-windows-static-md-production.result }}"
          echo "  ARM64 Static: ${{ needs.test-arm64-windows-static-production.result }}"
          echo ""

          # Count passed/failed
          JOBS=(
            "${{ needs.test-x64-linux-production.result }}"
            "${{ needs.test-x64-linux-experimental.result }}"
            "${{ needs.test-x64-linux-dynamic-production.result }}"
            "${{ needs.test-x64-linux-release-dbg-production.result }}"
            "${{ needs.test-x64-linux-musl-production.result }}"
            "${{ needs.test-arm64-linux-production.result }}"
            "${{ needs.test-x64-osx-production.result }}"
            "${{ needs.test-x64-osx-dynamic-production.result }}"
            "${{ needs.test-arm64-osx-production.result }}"
            "${{ needs.test-arm64-osx-dynamic-production.result }}"
            "${{ needs.test-x64-windows-production.result }}"
            "${{ needs.test-x64-windows-dynamic-production.result }}"
            "${{ needs.test-x64-windows-static-production.result }}"
            "${{ needs.test-x64-windows-static-md-production.result }}"
            "${{ needs.test-arm64-windows-static-production.result }}"
          )

          PASSED=0
          FAILED=0
          SKIPPED=0

          for job in "${JOBS[@]}"; do
            if [[ "$job" == "success" ]]; then
              ((PASSED++))
            elif [[ "$job" == "failure" ]]; then
              ((FAILED++))
            elif [[ "$job" == "skipped" ]]; then
              ((SKIPPED++))
            fi
          done

          echo "Results: $PASSED passed, $FAILED failed, $SKIPPED skipped"
          echo ""

          if [[ $FAILED -gt 0 ]]; then
            echo "::error::$FAILED job(s) failed"
            exit 1
          fi

      - name: Create summary report
        if: always()
        run: |
          echo "## CI Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Linux" >> $GITHUB_STEP_SUMMARY
          echo "| Triplet | Configuration | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| x64-linux | Production | ${{ needs.test-x64-linux-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-linux | Experimental | ${{ needs.test-x64-linux-experimental.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-linux-dynamic | Production | ${{ needs.test-x64-linux-dynamic-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-linux-release-dbg | Production | ${{ needs.test-x64-linux-release-dbg-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-linux-musl | Production | ${{ needs.test-x64-linux-musl-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| arm64-linux | Production | ${{ needs.test-arm64-linux-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### macOS" >> $GITHUB_STEP_SUMMARY
          echo "| Triplet | Configuration | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| x64-osx | Production | ${{ needs.test-x64-osx-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-osx-dynamic | Production | ${{ needs.test-x64-osx-dynamic-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| arm64-osx | Production | ${{ needs.test-arm64-osx-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| arm64-osx-dynamic | Production | ${{ needs.test-arm64-osx-dynamic-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Windows" >> $GITHUB_STEP_SUMMARY
          echo "| Triplet | Configuration | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| x64-windows | Production | ${{ needs.test-x64-windows-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-windows-dynamic | Production | ${{ needs.test-x64-windows-dynamic-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-windows-static | Production | ${{ needs.test-x64-windows-static-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64-windows-static-md | Production | ${{ needs.test-x64-windows-static-md-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| arm64-windows-static | Production | ${{ needs.test-arm64-windows-static-production.result }} |" >> $GITHUB_STEP_SUMMARY
