# Reusable Build and Test Workflow
#
# This is the core build and test workflow used by all CI workflows.
# Uses CMakePresets.json + run-cmake for modern, cache-friendly builds.
#
# Usage:
#   jobs:
#     build-and-test:
#       strategy:
#         matrix:
#           include:
#             - runner: ubuntu-latest
#               triplet: linux-x64
#               config: production
#       uses: ./.github/workflows/_build-test-reusable.yml
#       with:
#         runner: ${{ matrix.runner }}
#         triplet: ${{ matrix.triplet }}
#         config: ${{ matrix.config }}

name: Reusable Build and Test

on:
  workflow_call:
    inputs:
      runner:
        description: 'GitHub Actions runner to use'
        required: true
        type: string
      triplet:
        description: 'CMake preset triplet (e.g., linux-x64, osx-arm64)'
        required: true
        type: string
      config:
        description: 'Build configuration (production=stable, experimental=+Modern Thrift)'
        required: true
        type: string
      build-type:
        description: 'CMake build type (override preset default if needed)'
        required: false
        type: string
        default: ""
      with-fuse:
        description: 'Enable FUSE driver'
        required: false
        type: boolean
        default: false
      upload-artifacts:
        description: 'Upload build artifacts (binaries)'
        required: false
        type: boolean
        default: false
      upload-test-results:
        description: 'Upload test results'
        required: false
        type: boolean
        default: true
      skip-fuse-tests:
        description: 'Skip FUSE tests'
        required: false
        type: boolean
        default: true

    outputs:
      artifact-name:
        description: 'Generated artifact name'
        value: ${{ jobs.build-and-test.outputs.artifact-name }}
      build-status:
        description: 'Build status (success/failure)'
        value: ${{ jobs.build-and-test.outputs.build-status }}

jobs:
  build-and-test:
    name: ${{ inputs.runner }} (${{ inputs.triplet }}) - ${{ inputs.config }}
    runs-on: ${{ inputs.runner }}

    permissions:
      contents: read

    outputs:
      artifact-name: ${{ steps.generate-artifact-name.outputs.name }}
      build-status: ${{ steps.check-status.outputs.status }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Use get-cmake to cache CMake and Ninja executables
      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      # Setup vcpkg for production config
      - name: Setup vcpkg (production)
        if: inputs.config == 'production'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 7c11b72a6f810293d0ce234de126b99e9ab6fa7a
          vcpkgJsonGlob: '**/vcpkg-production.json'
          vcpkgDirectory: '${{ github.workspace }}/../vcpkg'

      # Setup vcpkg for experimental config (includes Modern Thrift)
      - name: Setup vcpkg (experimental)
        if: inputs.config == 'experimental'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 7c11b72a6f810293d0ce234de126b99e9ab6fa7a
          vcpkgJsonGlob: '**/vcpkg-experimental.json'
          vcpkgDirectory: '${{ github.workspace }}/../vcpkg'

      # Set environment for build
      - name: Setup build environment
        shell: bash
        run: |
          echo "VCPKG_DEFAULT_TRIPLET=${{ inputs.triplet }}" >> $GITHUB_ENV
          echo "VCPKG_OVERLAY_PORTS=$GITHUB_WORKSPACE/vcpkg_ports" >> $GITHUB_ENV
          echo "VCPKG_OVERLAY_TRIPLETS=$GITHUB_WORKSPACE/vcpkg_triplets" >> $GITHUB_ENV
          echo "✓ Triplet: ${{ inputs.triplet }}"
          echo "✓ Config: ${{ inputs.config }}"
          echo "✓ Binary cache: enabled (GitHub Actions cache)"

      # Setup additional dependencies (FUSE, etc.)
      - name: Setup build dependencies
        uses: ./.github/actions/setup-build-deps
        with:
          with-fuse: ${{ inputs.with-fuse }}

      # Run CMake with CMakePresets (configure + build + test)
      - name: Build and test with CMakePresets
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ inputs.triplet }}-${{ inputs.config }}
          buildPreset: ${{ inputs.triplet }}-${{ inputs.config }}
          testPreset: ${{ inputs.triplet }}-${{ inputs.config }}

      - name: Generate artifact name
        id: generate-artifact-name
        run: |
          # Create a consistent artifact name
          ARTIFACT="dwarfs-${{ inputs.triplet }}-${{ inputs.config }}"
          echo "name=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "artifact=$ARTIFACT" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        if: inputs.upload-artifacts == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.generate-artifact-name.outputs.name }}
          path: |
            build-${{ inputs.triplet }}-${{ inputs.config }}/tools/mkdwarfs/mkdwarfs*
            build-${{ inputs.triplet }}-${{ inputs.config }}/tools/dwarfs/dwarfs*
            build-${{ inputs.triplet }}-${{ inputs.config }}/tools/dwarfsextract/dwarfsextract*
            build-${{ inputs.triplet }}-${{ inputs.config }}/tools/dwarfs/dwarfsck*
            build-${{ inputs.triplet }}-${{ inputs.config }}/libdwarfs/*.a
            build-${{ inputs.triplet }}-${{ inputs.config }}/libdwarfs/*.so*
            build-${{ inputs.triplet }}-${{ inputs.config }}/libdwarfs/*.dylib*
            build-${{ inputs.triplet }}-${{ inputs.config }}/libdwarfs/*.dll*
          if-no-files-found: warn
          retention-days: 7

      - name: Upload test results
        if: inputs.upload-test-results == true && always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.triplet }}-${{ inputs.config }}
          path: |
            build-${{ inputs.triplet }}-${{ inputs.config }}/Testing/
            build-${{ inputs.triplet }}-${{ inputs.config }}/**/Test.xml
          if-no-files-found: warn

      - name: Check build status
        id: check-status
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Test summary
        if: always()
        run: |
          echo "=== Build Summary ==="
          echo "Runner: ${{ inputs.runner }}"
          echo "Triplet: ${{ inputs.triplet }}"
          echo "Config: ${{ inputs.config }}"
          echo "Status: ${{ steps.check-status.outputs.status }}"
          echo ""

          # Show test summary if available
          if [[ -f "build-${{ inputs.triplet }}-${{ inputs.config }}/Testing/Test.xml" ]]; then
            echo "=== Test Results ==="
            cat build-${{ inputs.triplet }}-${{ inputs.config }}/Testing/Test.xml | grep -o 'Test="[0-9]*"' | head -5 || true
          fi
