# Scheduled Comprehensive Testing Workflow
#
# Runs comprehensive tests across all platforms and configurations.
# Includes optional benchmarks and compatibility tests.
#
# Schedule: Weekly (Sundays at 2 AM UTC)
# Trigger: Manual dispatch with options

name: Scheduled Comprehensive Tests

on:
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      run-benchmarks:
        description: 'Run benchmarks (2-3 hours)'
        type: boolean
        default: false
      run-compat:
        description: 'Run compatibility tests'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  # Core test jobs - main platforms
  test-ubuntu-x64-flatbuffers:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: flatbuffers-only
      cache-key: scheduled-ubuntu-x64

  test-ubuntu-x64-both:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: both-formats
      cache-key: scheduled-ubuntu-x64

  test-ubuntu-arm64-flatbuffers:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-24.04-arm64
      triplet: arm64-linux
      config: flatbuffers-only
      cache-key: scheduled-ubuntu-arm64

  test-ubuntu-arm64-both:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-24.04-arm64
      triplet: arm64-linux
      config: both-formats
      cache-key: scheduled-ubuntu-arm64

  test-macos-x64-flatbuffers:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-15
      triplet: x64-osx
      config: flatbuffers-only
      cache-key: scheduled-macos-x64

  test-macos-x64-both:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-15
      triplet: x64-osx
      config: both-formats
      cache-key: scheduled-macos-x64

  test-macos-arm64-flatbuffers:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-14
      triplet: arm64-osx
      config: flatbuffers-only
      cache-key: scheduled-macos-arm64

  test-macos-arm64-both:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-14
      triplet: arm64-osx
      config: both-formats
      cache-key: scheduled-macos-arm64

  test-windows-x64-flatbuffers:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: windows-latest
      triplet: x64-windows-static
      config: flatbuffers-only
      cache-key: scheduled-windows-x64

  test-windows-x64-both:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: windows-latest
      triplet: x64-windows-static
      config: both-formats
      cache-key: scheduled-windows-x64

  # Compatibility tests (optional)
  compat-macos-arm64:
    needs: [test-macos-arm64-flatbuffers, test-macos-arm64-both]
    if: inputs.run-compat == true || github.event_name == 'schedule'
    uses: ./.github/workflows/_compat-test-reusable.yml
    with:
      runner: macos-14
      triplet: arm64-osx
      config: both-formats
      cache-key: scheduled-compat-arm64

  compat-macos-x64:
    needs: [test-macos-x64-flatbuffers, test-macos-x64-both]
    if: inputs.run-compat == true || github.event_name == 'schedule'
    uses: ./.github/workflows/_compat-test-reusable.yml
    with:
      runner: macos-15
      triplet: x64-osx
      config: both-formats
      cache-key: scheduled-compat-x64

  # Benchmarks (optional)
  benchmarks:
    needs: [test-ubuntu-x64-flatbuffers]
    if: inputs.run-benchmarks == true
    uses: ./.github/workflows/_benchmark-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux

  # Summary job
  summary:
    name: Test Summary
    needs:
      - test-ubuntu-x64-flatbuffers
      - test-ubuntu-x64-both
      - test-ubuntu-arm64-flatbuffers
      - test-ubuntu-arm64-both
      - test-macos-x64-flatbuffers
      - test-macos-x64-both
      - test-macos-arm64-flatbuffers
      - test-macos-arm64-both
      - test-windows-x64-flatbuffers
      - test-windows-x64-both
      - compat-macos-arm64
      - compat-macos-x64
      - benchmarks
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Display summary
        run: |
          echo "=== Scheduled Comprehensive Tests Complete ==="
          echo ""
          echo "Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "Run: ${{ github.run_number }}"
          echo ""
          echo "Tests run on 5 platforms × 2 configs = 10+ jobs"
          echo ""
          echo "View results in the Actions tab for detailed logs."
