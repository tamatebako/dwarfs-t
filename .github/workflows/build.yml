# Build Workflow - Comprehensive Testing
#
# This is the main build workflow that runs on pushes to main and feature branches.
# Uses CMakePresets.json for consistent, cache-friendly builds.
#
# For fast PR validation, use pr-validation.yml instead.
# For full matrix testing, use ci-matrix.yml or workflow_dispatch.

name: Build

on:
  push:
    branches: [main, feature/**]
    paths-ignore:
      - '.benchmark/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.gitignore'
      - '.maintainer-scripts/**'
      - 'CHANGES.md'
      - 'CITATION.cff'
      - 'TODO'
      - 'doc/**'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to test (comma-separated: linux,macos,windows)'
        required: false
        type: string
        default: 'linux'
      configs:
        description: 'Configs to test (comma-separated: production,experimental)'
        required: false
        type: string
        default: 'production,experimental'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ========================================================================
  # Linux x64 - Production (Primary test - always runs)
  # ========================================================================
  linux-x64-production:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: production

  # ========================================================================
  # Linux x64 - Experimental
  # ========================================================================
  linux-x64-experimental:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: experimental

  # ========================================================================
  # Additional Linux configurations (triggered by workflow_dispatch)
  # ========================================================================
  linux-x64-dynamic-production:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux-dynamic
      config: production

  linux-arm64-production:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-24.04-arm64
      triplet: arm64-linux
      config: production

  linux-arm64-experimental:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-24.04-arm64
      triplet: arm64-linux
      config: experimental

  # ========================================================================
  # macOS configurations (triggered by workflow_dispatch)
  # ========================================================================
  macos-x64-production:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-13
      triplet: x64-osx
      config: production

  macos-arm64-production:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-latest
      triplet: arm64-osx
      config: production

  macos-arm64-experimental:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-latest
      triplet: arm64-osx
      config: experimental

  # ========================================================================
  # Windows configurations (triggered by workflow_dispatch)
  # ========================================================================
  windows-x64-static-production:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: windows-latest
      triplet: x64-windows-static
      config: production

  windows-arm64-static-production:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: windows-latest
      triplet: arm64-windows-static
      config: production

  # ========================================================================
  # Summary job
  # ========================================================================
  summary:
    name: CI Summary
    needs:
      - linux-x64-production
      - linux-x64-experimental
      - linux-x64-dynamic-production
      - linux-arm64-production
      - linux-arm64-experimental
      - macos-x64-production
      - macos-arm64-production
      - macos-arm64-experimental
      - windows-x64-static-production
      - windows-arm64-static-production
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-results-*
          path: benchmark-results
        continue-on-error: true

      - name: Display summary
        run: |
          echo "=== CI Build Workflow Summary ==="
          echo ""
          echo "Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "Run: ${{ github.run_number }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Trigger: ${{ github.event_name }}"
          echo ""
          echo "Job Status:"
          echo "  Linux x64 production:      ${{ needs.linux-x64-production.result }}"
          echo "  Linux x64 experimental:    ${{ needs.linux-x64-experimental.result }}"
          if [ "${{ needs.linux-x64-dynamic-production.result }}" != "skipped" ]; then
            echo "  Linux x64 dynamic:         ${{ needs.linux-x64-dynamic-production.result }}"
          fi
          if [ "${{ needs.linux-arm64-production.result }}" != "skipped" ]; then
            echo "  Linux ARM64 production:    ${{ needs.linux-arm64-production.result }}"
          fi
          if [ "${{ needs.linux-arm64-experimental.result }}" != "skipped" ]; then
            echo "  Linux ARM64 experimental:  ${{ needs.linux-arm64-experimental.result }}"
          fi
          if [ "${{ needs.macos-x64-production.result }}" != "skipped" ]; then
            echo "  macOS x64 production:      ${{ needs.macos-x64-production.result }}"
          fi
          if [ "${{ needs.macos-arm64-production.result }}" != "skipped" ]; then
            echo "  macOS ARM64 production:    ${{ needs.macos-arm64-production.result }}"
          fi
          if [ "${{ needs.macos-arm64-experimental.result }}" != "skipped" ]; then
            echo "  macOS ARM64 experimental:  ${{ needs.macos-arm64-experimental.result }}"
          fi
          if [ "${{ needs.windows-x64-static-production.result }}" != "skipped" ]; then
            echo "  Windows x64 static:        ${{ needs.windows-x64-static-production.result }}"
          fi
          if [ "${{ needs.windows-arm64-static-production.result }}" != "skipped" ]; then
            echo "  Windows ARM64 static:      ${{ needs.windows-arm64-static-production.result }}"
          fi
          echo ""
          echo "For full matrix testing, use workflow_dispatch or ci-matrix.yml."
          echo "View detailed logs in the Actions tab."

          echo "### Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d "benchmark-results" ] && [ "$(ls -A benchmark-results)" ]; then
            echo "The following benchmark results are available:" >> $GITHUB_STEP_SUMMARY
            for dir in benchmark-results/benchmark-results-*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                echo "- \`${dirname}\`" >> $GITHUB_STEP_SUMMARY
              fi
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Note**: Benchmark results are retained for 30 days." >> $GITHUB_STEP_SUMMARY
          else
            echo "No benchmark results available." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
