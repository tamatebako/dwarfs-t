################################################################################

  # PRIORITY 1: Test the CMake fix on simplest configuration first
  encoding-test-linux-x86_64-flatbuffers-only:
    name: Encoding Test - Ubuntu (x86_64) - FlatBuffers Only
    uses: ./.github/workflows/encoding-format-test.yml
    with:
      os: ubuntu
      arch: x86_64
      runner: ubuntu-latest
      format: flatbuffers-only
      with_thrift: false
      with_flatbuffers: true
      should_pass: true

  # PRIORITY 2: Test both encodings to ensure full compatibility
  encoding-test-linux-x86_64-both-formats:
    name: Encoding Test - Ubuntu (x86_64) - Both Encodings
    uses: ./.github/workflows/encoding-format-test.yml
    with:
      os: ubuntu
      arch: x86_64
      runner: ubuntu-latest
      format: both-formats
      with_thrift: true
      with_flatbuffers: true
      should_pass: true

  # PRIORITY 3: Ensure legacy-thrift format still works
  encoding-test-linux-x86_64-legacy-thrift:
    name: Encoding Test - Ubuntu (x86_64) - Legacy Thrift (Frozen2)
    uses: ./.github/workflows/encoding-format-test.yml
    with:
      os: ubuntu
      arch: x86_64
      runner: ubuntu-latest
      format: legacy-thrift
      with_thrift: false  # Legacy is hand-coded, no fbthrift
      with_flatbuffers: false
      should_pass: true
