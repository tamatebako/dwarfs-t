# Build Workflow - Comprehensive Testing
#
# This is the main build workflow that runs on pushes to main and feature branches.
# Uses CMakePresets.json for consistent, cache-friendly builds.
#
# For fast PR validation, use pr-validation.yml instead.

name: Build

on:
  push:
    branches: [main, feature/**]
    paths-ignore:
      - '.benchmark/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.gitignore'
      - '.maintainer-scripts/**'
      - 'CHANGES.md'
      - 'CITATION.cff'
      - 'TODO'
      - 'doc/**'
  workflow_dispatch:
    inputs:
      config:
        description: 'Configuration to test'
        required: false
        type: choice
        options:
          - production
          - experimental
        default: production

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Ubuntu x64 - production (PRIMARY TEST)
  test-ubuntu-production:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: production

  # Ubuntu x64 - experimental
  test-ubuntu-experimental:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: experimental

  # Summary job
  summary:
    name: CI Summary
    needs: [test-ubuntu-production, test-ubuntu-experimental]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-results-*
          path: benchmark-results
        continue-on-error: true

      - name: Display summary
        run: |
          echo "=== CI Main Workflow Summary ==="
          echo ""
          echo "Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "Run: ${{ github.run_number }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "Job Status:"
          echo "  Ubuntu production: ${{ needs.test-ubuntu-production.result }}"
          echo "  Ubuntu experimental: ${{ needs.test-ubuntu-experimental.result }}"
          echo ""
          echo "View results in the Actions tab for detailed logs."

          echo "### Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d "benchmark-results" ] && [ "$(ls -A benchmark-results)" ]; then
            echo "The following benchmark results are available:" >> $GITHUB_STEP_SUMMARY
            for dir in benchmark-results/benchmark-results-*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                echo "- \`${dirname}\`" >> $GITHUB_STEP_SUMMARY
              fi
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Note**: Benchmark results are retained for 30 days." >> $GITHUB_STEP_SUMMARY
          else
            echo "No benchmark results available." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
