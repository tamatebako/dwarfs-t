# CI Main Workflow - Comprehensive Testing
#
# This is the main CI workflow that runs on pushes to main branch.
# It provides comprehensive validation across all platforms and configurations.
#
# This workflow replaces the old build.yml and provides:
# - Full platform matrix (5 platforms)
# - All configurations (flatbuffers-only, both-formats)
# - Compatibility tests
# - ~45 minute runtime
#
# For fast PR validation, use pr-validation.yml instead.

name: CI Main

on:
  push:
    branches: [main, feature/multi-format-serialization-fuse]
    paths-ignore:
      - '.benchmark/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.gitignore'
      - '.maintainer-scripts/**'
      - 'CHANGES.md'
      - 'CITATION.cff'
      - 'TODO'
      - 'doc/**'
      # Note: Allow .github/**/*.md changes to trigger CI for documentation updates
      - 'README.md'
      - 'ARCHITECTURE.md'
      - 'BUILD_SYSTEM_ARCHITECTURE.md'
      - 'CLEANUP_PLAN.md'
      - 'STATUS_REPORT.md'
      - 'WORKFLOW_GUIDE.md'
  workflow_dispatch:
    inputs:
      config:
        description: 'Configuration to test (all, flatbuffers-only, both-formats)'
        required: false
        type: string
        default: 'all'
      triplet:
        description: 'Specific vcpkg triplet to test'
        required: false
        type: string

permissions:
  contents: read

jobs:
  # Linux x64 - flatbuffers-only
  test-ubuntu-x64-flatbuffers:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: flatbuffers-only
      build-type: Release
      cache-key: ci-main-ubuntu-latest-x64-linux

  # Linux x64 - both-formats
  test-ubuntu-x64-both:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: both-formats
      build-type: Release
      cache-key: ci-main-ubuntu-latest-x64-linux

  # Linux ARM64 - flatbuffers-only
  test-ubuntu-arm64-flatbuffers:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-24.04-arm64
      triplet: arm64-linux
      config: flatbuffers-only
      build-type: Release
      cache-key: ci-main-ubuntu-arm64-x64-linux

  # Linux ARM64 - both-formats
  test-ubuntu-arm64-both:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-24.04-arm64
      triplet: arm64-linux
      config: both-formats
      build-type: Release
      cache-key: ci-main-ubuntu-arm64-x64-linux

  # macOS x64 (Intel) - flatbuffers-only
  test-macos-x64-flatbuffers:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-13
      triplet: x64-osx
      config: flatbuffers-only
      build-type: Release
      cache-key: ci-main-macos-13-x64-osx

  # macOS x64 (Intel) - both-formats
  test-macos-x64-both:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-13
      triplet: x64-osx
      config: both-formats
      build-type: Release
      cache-key: ci-main-macos-13-x64-osx

  # macOS ARM64 (Apple Silicon) - flatbuffers-only
  test-macos-arm64-flatbuffers:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-14
      triplet: arm64-osx
      config: flatbuffers-only
      build-type: Release
      cache-key: ci-main-macos-14-arm64-osx

  # macOS ARM64 (Apple Silicon) - both-formats
  test-macos-arm64-both:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: macos-14
      triplet: arm64-osx
      config: both-formats
      build-type: Release
      cache-key: ci-main-macos-14-arm64-osx

  # Windows x64 - flatbuffers-only
  test-windows-x64-flatbuffers:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: windows-latest
      triplet: x64-windows-static
      config: flatbuffers-only
      build-type: Release
      cache-key: ci-main-windows-latest-x64-windows-static

  # Windows x64 - both-formats
  test-windows-x64-both:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: windows-latest
      triplet: x64-windows-static
      config: both-formats
      build-type: Release
      cache-key: ci-main-windows-latest-x64-windows-static

  # Compatibility tests (macOS ARM64)
  compat-macos-arm64:
    needs: [test-macos-arm64-flatbuffers, test-macos-arm64-both]
    uses: ./.github/workflows/_compat-test-reusable.yml
    with:
      runner: macos-14
      triplet: arm64-osx
      config: both-formats
      cache-key: ci-compat-macos-14

  # Compatibility tests (macOS x64)
  compat-macos-x64:
    needs: [test-macos-x64-flatbuffers, test-macos-x64-both]
    uses: ./.github/workflows/_compat-test-reusable.yml
    with:
      runner: macos-13
      triplet: x64-osx
      config: both-formats
      cache-key: ci-compat-macos-13

  # Summary job
  summary:
    name: CI Summary
    needs:
      - test-ubuntu-x64-flatbuffers
      - test-ubuntu-x64-both
      - test-ubuntu-arm64-flatbuffers
      - test-ubuntu-arm64-both
      - test-macos-x64-flatbuffers
      - test-macos-x64-both
      - test-macos-arm64-flatbuffers
      - test-macos-arm64-both
      - test-windows-x64-flatbuffers
      - test-windows-x64-both
      - compat-macos-arm64
      - compat-macos-x64
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Display summary
        run: |
          echo "=== CI Main Workflow Summary ==="
          echo ""
          echo "Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "Run: ${{ github.run_number }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "View results in the Actions tab for detailed logs."
