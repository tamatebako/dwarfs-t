# CI Main Workflow - Comprehensive Testing
#
# This is the main CI workflow that runs on pushes to main branch.
# It provides validation on the most important platform (Ubuntu x64).
#
# For fast PR validation, use pr-validation.yml instead.

name: CI Main

on:
  push:
    branches: [main, feature/multi-format-serialization-fuse]
    paths-ignore:
      - '.benchmark/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.gitignore'
      - '.maintainer-scripts/**'
      - 'CHANGES.md'
      - 'CITATION.cff'
      - 'TODO'
      - 'doc/**'
      # Note: Allow .github/**/*.md changes to trigger CI for documentation updates
      - 'README.md'
      - 'ARCHITECTURE.md'
      - 'BUILD_SYSTEM_ARCHITECTURE.md'
      - 'CLEANUP_PLAN.md'
      - 'STATUS_REPORT.md'
      - 'WORKFLOW_GUIDE.md'
  workflow_dispatch:
    inputs:
      config:
        description: 'Configuration to test'
        required: false
        type: choice
        options:
          - flatbuffers-only
          - both-formats
        default: flatbuffers-only

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Ubuntu x64 - flatbuffers-only (PRIMARY TEST)
  test-ubuntu-flatbuffers:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: flatbuffers-only
      build-type: Release
      cache-key: ci-main-ubuntu-x64

  # Ubuntu x64 - both-formats
  test-ubuntu-both:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: both-formats
      build-type: Release
      cache-key: ci-main-ubuntu-x64

  # Summary job
  summary:
    name: CI Summary
    needs: [test-ubuntu-flatbuffers, test-ubuntu-both]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Display summary
        run: |
          echo "=== CI Main Workflow Summary ==="
          echo ""
          echo "Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "Run: ${{ github.run_number }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "Job Status:"
          echo "  Ubuntu flatbuffers-only: ${{ needs.test-ubuntu-flatbuffers.result }}"
          echo "  Ubuntu both-formats: ${{ needs.test-ubuntu-both.result }}"
          echo ""
          echo "View results in the Actions tab for detailed logs."
