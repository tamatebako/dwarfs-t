---
name: FreeBSD Builds

on:
  workflow_call:

permissions:
  contents: read

jobs:
  freebsd:
    runs-on:
      - self-hosted
      - freebsd
      - ${{ matrix.arch }}

    strategy:
      matrix:
        arch:
          - amd64
        build_mode:
          - Release
          - Debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: '0'
          ref: ${{ github.ref }}

      - name: Run Build
        run: |
          BUILD_MODE=${{ matrix.build_mode }} \
          sh .github/scripts/freebsd_jail_build.sh