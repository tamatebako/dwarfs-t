# ⚠️ DEPRECATED - This workflow is no longer maintained
#
# This reusable workflow has been superseded by `_build-test-reusable.yml` in the new unified CI/CD architecture.
#
# REPLACEMENT WORKFLOW:
# - Use `_build-test-reusable.yml` for standardized vcpkg-based builds
#
# The new workflow provides:
# - Consistent vcpkg usage with Tebako jemalloc 5.5.0
# - Better artifact handling
# - Standardized test result uploads
# - Build status outputs
#
# See `.github/CI_CD_ARCHITECTURE_PROPOSAL.md` for the complete architecture.
#
# NOTE: This workflow uses system packages instead of vcpkg, which may be
# useful for quick testing without vcpkg. However, for consistent builds
# across all platforms, the new vcpkg-based workflow is recommended.
#
# Migration Date: 2025-01-19
# Deprecation Date: 2025-01-19

---
name: Build and Test (DEPRECATED)

on:
  workflow_call:
    inputs:
      os:
        description: 'Operating system (ubuntu, macos, windows)'
        required: true
        type: string
      arch:
        description: 'Architecture (x64, aarch64, ARM64)'
        required: false
        type: string
        default: 'x64'
      runner:
        description: 'Runner label override'
        required: false
        type: string
        default: ''
      build_type:
        description: 'Build type (Release, Debug, RelWithDebInfo)'
        required: false
        type: string
        default: 'Release'
      with_thrift:
        description: 'Enable Thrift support'
        required: false
        type: boolean
        default: true
      with_flatbuffers:
        description: 'Enable FlatBuffers support'
        required: false
        type: boolean
        default: true
      with_fuse:
        description: 'Enable FUSE driver'
        required: false
        type: boolean
        default: false
      with_tests:
        description: 'Enable tests'
        required: false
        type: boolean
        default: true
      with_benchmarks:
        description: 'Enable benchmarks'
        required: false
        type: boolean
        default: false
      vcpkg_triplet:
        description: 'vcpkg triplet (for Windows)'
        required: false
        type: string
        default: 'x64-windows-static'
      cmake_extra_args:
        description: 'Extra CMake arguments'
        required: false
        type: string
        default: ''
      upload_artifacts:
        description: 'Upload build artifacts'
        required: false
        type: boolean
        default: false
      artifact_name:
        description: 'Artifact name for upload'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ${{ inputs.runner != '' && inputs.runner || (inputs.os == 'ubuntu' && 'ubuntu-latest' || inputs.os == 'macos' && 'macos-latest' || 'windows-latest') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure (Unix)
        if: inputs.os != 'windows'
        shell: bash
        run: |
          cmake -B build -GNinja \
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
            -DWITH_TESTS=${{ inputs.with_tests && 'ON' || 'OFF' }} \
            -DWITH_BENCHMARKS=${{ inputs.with_benchmarks && 'ON' || 'OFF' }} \
            -DWITH_FUSE_DRIVER=${{ inputs.with_fuse && 'ON' || 'OFF' }} \
            -DDWARFS_WITH_THRIFT=${{ inputs.with_thrift && 'ON' || 'OFF' }} \
            -DDWARFS_WITH_FLATBUFFERS=${{ inputs.with_flatbuffers && 'ON' || 'OFF' }} \
            ${{ inputs.cmake_extra_args }}

      - name: Configure (Windows)
        if: inputs.os == 'windows'
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A ${{ inputs.arch }} `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=${{ inputs.vcpkg_triplet }} `
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} `
            -DWITH_TESTS=${{ inputs.with_tests && 'ON' || 'OFF' }} `
            -DWITH_BENCHMARKS=${{ inputs.with_benchmarks && 'ON' || 'OFF' }} `
            -DWITH_FUSE_DRIVER=${{ inputs.with_fuse && 'ON' || 'OFF' }} \
            -DDWARFS_WITH_THRIFT=${{ inputs.with_thrift && 'ON' || 'OFF' }} \
            -DDWARFS_WITH_FLATBUFFERS=${{ inputs.with_flatbuffers && 'ON' || 'OFF' }} `
            ${{ inputs.cmake_extra_args }}

      - name: Build (Unix)
        if: inputs.os != 'windows'
        shell: bash
        run: |
          cmake --build build --parallel

      - name: Build (Windows)
        if: inputs.os == 'windows'
        shell: pwsh
        run: |
          cmake --build build --config ${{ inputs.build_type }} --parallel

      - name: Test (Unix)
        if: inputs.with_tests && inputs.os != 'windows'
        shell: bash
        run: |
          ctest --test-dir build --output-on-failure -j

      - name: Test (Windows)
        if: inputs.with_tests && inputs.os == 'windows'
        shell: pwsh
        run: |
          ctest --test-dir build -C ${{ inputs.build_type }} --output-on-failure -j

      - name: Upload Artifacts (Unix)
        if: inputs.upload_artifacts && inputs.os != 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name != '' && inputs.artifact_name || format('dwarfs-{0}-{1}', inputs.os, inputs.arch) }}
          path: |
            build/mkdwarfs
            build/dwarfs
            build/dwarfsck
            build/dwarfsextract
            build/dwarfs_benchmark
          if-no-files-found: warn

      - name: Upload Artifacts (Windows)
        if: inputs.upload_artifacts && inputs.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name != '' && inputs.artifact_name || format('dwarfs-{0}-{1}', inputs.os, inputs.arch) }}
          path: |
            build/${{ inputs.build_type }}/mkdwarfs.exe
            build/${{ inputs.build_type }}/dwarfs.exe
            build/${{ inputs.build_type }}/dwarfsck.exe
            build/${{ inputs.build_type }}/dwarfsextract.exe
            build/${{ inputs.build_type }}/dwarfs_benchmark.exe
          if-no-files-found: warn
