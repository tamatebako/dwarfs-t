# Windows CI Matrix Workflow
#
# MSVC-based Windows testing across all supported triplets.
# Tests x64 (static/dynamic) and ARM64 (static).
#
# Platform Coverage:
# - x64-windows-static (MSVC static)
# - x64-windows-dynamic (MSVC dynamic)
# - arm64-windows-static (ARM64 MSVC static)
#
# Note: MinGW/MSYS builds use a separate workflow (windows-gcc-matrix.yml)
#       because they require completely different toolchains and build configurations.

name: Windows Matrix

on:
  pull_request:
    branches: [main, feature/*]
  push:
    branches: [main, feature/**]
    paths-ignore:
      - '.benchmark/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.gitignore'
      - '.maintainer-scripts/**'
      - 'CHANGES.md'
      - 'CITATION.cff'
      - 'doc/**'
      - 'TODO'
  workflow_dispatch:

concurrency:
  group: windows-matrix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write  # Required for GitHub Packages binary caching

jobs:
  # ========================================================================
  # x64 Jobs
  # ========================================================================
  windows-x64-static-production:
    name: 🪟 x64 · Static
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: x64-windows-static
      config: production
      vcpkg-manifest: vcpkg-production.json

  windows-x64-static-experimental:
    name: 🧪 x64 · Static · Exp
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: x64-windows-static
      config: experimental
      vcpkg-manifest: vcpkg-experimental.json
      continue-on-error: true

  windows-x64-dynamic-production:
    name: 🔧 x64 · Dynamic
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: x64-windows-dynamic
      config: production
      vcpkg-manifest: vcpkg-production.json

  windows-x64-dynamic-experimental:
    name: 🧪 x64 · Dynamic · Exp
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: x64-windows-dynamic
      config: experimental
      vcpkg-manifest: vcpkg-experimental.json
      continue-on-error: true

  # ========================================================================
  # ARM64 Jobs
  # ========================================================================
  windows-arm64-static-production:
    name: 🪟 ARM64 · Static
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: arm64-windows-static
      config: production
      vcpkg-manifest: vcpkg-production.json

  windows-arm64-static-experimental:
    name: 🧪 ARM64 · Static · Exp
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: arm64-windows-static
      config: experimental
      vcpkg-manifest: vcpkg-experimental.json
      continue-on-error: true

  # ========================================================================
  # Summary
  # ========================================================================
  summary:
    name: 📊 Summary
    needs:
      - windows-x64-static-production
      - windows-x64-static-experimental
      - windows-x64-dynamic-production
      - windows-x64-dynamic-experimental
      - windows-arm64-static-production
      - windows-arm64-static-experimental
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📊 Results
        run: |
          echo "# Windows MSVC Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| x64 Static | ${{ needs.windows-x64-static-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64 Static Exp | ${{ needs.windows-x64-static-experimental.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64 Dynamic | ${{ needs.windows-x64-dynamic-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64 Dynamic Exp | ${{ needs.windows-x64-dynamic-experimental.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ARM64 Static | ${{ needs.windows-arm64-static-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ARM64 Static Exp | ${{ needs.windows-arm64-static-experimental.result }} |" >> $GITHUB_STEP_SUMMARY
