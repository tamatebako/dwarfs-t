# Windows CI Matrix Workflow
#
# Comprehensive Windows testing across all supported triplets.
# Tests x64 (static/dynamic/MSYS/MinGW) and ARM64 (static).
#
# Platform Coverage:
# - x64-windows-static (MSVC static)
# - x64-windows-dynamic (MSVC dynamic)
# - x64-windows-msys (MSYS2)
# - x64-windows-mingw (MinGW)
# - arm64-windows-static (ARM64 MSVC static)

name: Windows Matrix

on:
  pull_request:
    branches: [main, feature/*]
  push:
    branches: [main, feature/**]
    paths-ignore:
      - '.benchmark/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.gitignore'
      - '.maintainer-scripts/**'
      - 'CHANGES.md'
      - 'CITATION.cff'
      - 'doc/**'
      - 'TODO'
  workflow_dispatch:

concurrency:
  group: windows-matrix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write  # Required for GitHub Packages binary caching

jobs:
  # ========================================================================
  # x64 Jobs
  # ========================================================================
  windows-x64-static-production:
    name: 🪟 x64 · Static
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: x64-windows-static
      config: production
      vcpkg-manifest: vcpkg-production.json

  windows-x64-dynamic-production:
    name: 🔧 x64 · Dynamic
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: x64-windows-dynamic
      config: production
      vcpkg-manifest: vcpkg-production.json

  windows-x64-msys-production:
    name: 🔧 x64 · MSYS
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: x64-windows-msys
      config: production
      vcpkg-manifest: vcpkg-production.json

  windows-x64-mingw-production:
    name: 🔧 x64 · MinGW
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: x64-windows-mingw
      config: production
      vcpkg-manifest: vcpkg-production.json

  # ========================================================================
  # ARM64 Jobs
  # ========================================================================
  windows-arm64-static-production:
    name: 🪟 ARM64 · Static
    uses: ./.github/workflows/_build.yml
    with:
      runner: windows-latest
      triplet: arm64-windows-static
      config: production
      vcpkg-manifest: vcpkg-production.json

  # ========================================================================
  # Summary
  # ========================================================================
  summary:
    name: 📊 Summary
    needs:
      - windows-x64-static-production
      - windows-x64-dynamic-production
      - windows-x64-msys-production
      - windows-x64-mingw-production
      - windows-arm64-static-production
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📊 Results
        run: |
          echo "# Windows Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| x64 Static | ${{ needs.windows-x64-static-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64 Dynamic | ${{ needs.windows-x64-dynamic-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64 MSYS | ${{ needs.windows-x64-msys-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x64 MinGW | ${{ needs.windows-x64-mingw-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ARM64 Static | ${{ needs.windows-arm64-static-production.result }} |" >> $GITHUB_STEP_SUMMARY
