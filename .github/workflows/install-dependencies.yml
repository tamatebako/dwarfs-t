---
name: Install Dependencies

on:
  workflow_call:
    inputs:
      os:
        description: 'Operating system (ubuntu, macos, windows)'
        required: true
        type: string
      arch:
        description: 'Architecture (x64, aarch64, ARM64)'
        required: false
        type: string
        default: 'x64'
      with_thrift:
        description: 'Install Thrift dependencies'
        required: false
        type: boolean
        default: false
      with_fuse:
        description: 'Install FUSE dependencies'
        required: false
        type: boolean
        default: false
      vcpkg_triplet:
        description: 'vcpkg triplet (for Windows)'
        required: false
        type: string
        default: 'x64-windows-static'

jobs:
  install:
    runs-on: ${{ inputs.os == 'ubuntu' && 'ubuntu-latest' || inputs.os == 'macos' && 'macos-latest' || 'windows-latest' }}

    steps:
      - name: Install Dependencies (Ubuntu)
        if: inputs.os == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libboost-all-dev \
            libssl-dev \
            libevent-dev \
            libdouble-conversion-dev \
            libfmt-dev \
            libgoogle-glog-dev \
            liblz4-dev \
            liblzma-dev \
            libzstd-dev \
            libxxhash-dev \
            libbz2-dev \
            libarchive-dev \
            libgtest-dev

          # Install FUSE if requested
          if [ "${{ inputs.with_fuse }}" = "true" ]; then
            sudo apt-get install -y libfuse3-dev fuse3
          fi

      - name: Install Thrift (Ubuntu)
        if: inputs.os == 'ubuntu' && inputs.with_thrift
        run: |
          sudo apt-get install -y libthrift-dev

      - name: Install Dependencies (macOS)
        if: inputs.os == 'macos'
        run: |
          brew install \
            ninja \
            boost \
            openssl \
            libevent \
            double-conversion \
            fmt \
            glog \
            lz4 \
            xz \
            zstd \
            xxhash \
            bzip2 \
            libarchive \
            googletest

      - name: Install Thrift (macOS)
        if: inputs.os == 'macos' && inputs.with_thrift
        run: |
          brew install thrift

      - name: Install Dependencies (Windows)
        if: inputs.os == 'windows'
        run: |
          choco install winfsp -y

          if ("${{ inputs.arch }}" -eq "ARM64") {
            # boost-fiber not supported on ARM64
            vcpkg install --classic --triplet=${{ inputs.vcpkg_triplet }} `
              boost-system boost-filesystem boost-program-options `
              boost-iostreams boost-context `
              zlib lz4 zstd xxhash bzip2 liblzma `
              libarchive libevent double-conversion jemalloc gtest
          } else {
            vcpkg install --classic --triplet=${{ inputs.vcpkg_triplet }} `
              boost-system boost-filesystem boost-program-options `
              boost-iostreams boost-context boost-fiber `
              zlib lz4 zstd xxhash bzip2 liblzma `
              libarchive libevent double-conversion jemalloc gtest
          }

      - name: Install Thrift (Windows)
        if: inputs.os == 'windows' && inputs.with_thrift
        run: |
          vcpkg install --classic --triplet=${{ inputs.vcpkg_triplet }} thrift