# Homebrew Compatibility Testing Workflow
# vim:set ts=2 sw=2 sts=2 et:
#
# This workflow tests compatibility between our Legacy Thrift implementation
# and the Homebrew dwarfs tool across multiple platforms and architectures.

name: Homebrew Compatibility Tests

on:
  push:
    branches: ['main', 'develop']
    paths:
      - 'src/metadata/**'
      - 'include/dwarfs/metadata/**'
      - 'test/compat/**'
      - '.github/workflows/compat-test.yml'
  pull_request:
    branches: ['main', 'develop']
    paths:
      - 'src/metadata/**'
      - 'include/dwarfs/metadata/**'
      - 'test/compat/**'
      - '.github/workflows/compat-test.yml'
  workflow_dispatch:
    inputs:
      dwarfs_version:
        description: 'Homebrew dwarfs version to test'
        required: false
        default: 'latest'
        type: string
      platform_filter:
        description: 'Filter by platform (darwin/linux)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - darwin
          - linux

env:
  DWARFS_VERSION: latest

jobs:
  # Matrix job for multi-platform testing
  compat-test:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 (Apple Silicon)
          - os: macos-14
            arch: arm64
            platform: darwin
            runner: macos-14
            homebrew_prefix: /opt/homebrew

          # macOS x86_64 (Intel)
          - os: macos-13
            arch: x86_64
            platform: darwin
            runner: macos-13
            homebrew_prefix: /usr/local

          # Linux arm64
          - os: ubuntu-24.04-arm64
            arch: arm64
            platform: linux
            runner: ubuntu-24.04-arm64
            homebrew_prefix: /home/linuxbrew/.linuxbrew

          # Linux x86_64
          - os: ubuntu-24.04
            arch: x86_64
            platform: linux
            runner: ubuntu-24.04
            homebrew_prefix: /home/linuxbrew/.linuxbrew

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: ./.github/actions/setup-homebrew-dwarfs
        with:
          dwarfs_version: ${{ inputs.dwarfs_version || env.DWARFS_VERSION }}
          homebrew_prefix: ${{ matrix.homebrew_prefix }}

      - name: Install system dependencies (macOS)
        if: matrix.platform == 'darwin'
        run: |
          brew install openssl
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl)" >> $GITHUB_ENV

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libssl-dev \
            libxxhash-dev \
            pkg-config \
            fuse3

      - name: Configure CMake
        run: |
          cmake -B build \
            -DDWARFS_BUILD_DIR=$PWD/build \
            -DWITH_TESTS=ON \
            -DWITH_COMPAT_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build compat tests
        run: |
          cmake --build build --target dwarfs-compat-lib -j$(sysctl -n hw.ncpu 2>/dev/null || nproc)

      - name: Check Homebrew dwarfs
        working-directory: test/compat
        run: |
          ./scripts/check_homebrew.sh --verbose --format json

      - name: Generate fixtures
        working-directory: test/compat
        run: |
          ./scripts/generate_fixtures.sh \
            --version ${{ inputs.dwarfs_version || env.DWARFS_VERSION }} \
            --platform ${{ matrix.platform }} \
            --arch ${{ matrix.arch }} \
            --verbose

      - name: Validate fixtures
        working-directory: test/compat
        run: |
          ./scripts/validate_fixtures.sh --dir fixtures --verbose

      - name: Run compat tests
        working-directory: test/compat
        run: |
          ./scripts/run_tests.sh \
            --version ${{ inputs.dwarfs_version || env.DWARFS_VERSION }} \
            --platform ${{ matrix.platform }} \
            --arch ${{ matrix.arch }} \
            --types all \
            --format json \
            --output results-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compat-results-${{ matrix.platform }}-${{ matrix.arch }}
          path: test/compat/results-*.json
          retention-days: 30

      - name: Upload fixtures
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fixtures-${{ matrix.platform }}-${{ matrix.arch }}
          path: test/compat/fixtures/*.dft
          retention-days: 7

  # Summary job
  compat-summary:
    name: Compatibility Test Summary
    needs: compat-test
    runs-on: ubuntu-24.04
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Generate summary report
        run: |
          echo "# Homebrew Compatibility Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for result_file in results/compat-results-*/results-*.json; do
            if [ -f "$result_file" ]; then
              echo "### $(basename $(dirname $result_file))" >> $GITHUB_STEP_SUMMARY
              echo '```json' >> $GITHUB_STEP_SUMMARY
              cat "$result_file" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Check for failures
        run: |
          failed=false
          for result_file in results/compat-results-*/results-*.json; do
            if [ -f "$result_file" ]; then
              failed_tests=$(jq -r '.summary.failed // 0' "$result_file")
              if [ "$failed_tests" -gt 0 ]; then
                failed=true
                echo "::error::Failed tests in $(basename $(dirname $result_file)): $failed_tests"
              fi
            fi
          done

          if [ "$failed" = "true" ]; then
            exit 1
          fi
