# Reusable workflow for vcpkg-based builds
# vim:set ts=2 sw=2 sts=2 et:
#
# This workflow provides a standardized vcpkg-based build
# across all platforms and triplets

name: vcpkg-build

on:
  workflow_call:
    inputs:
      triplet:
        description: 'vcpkg triplet (e.g., x64-windows-static, arm64-osx)'
        required: true
        type: string

      os:
        description: 'GitHub Actions runner OS'
        required: true
        type: string

      build-type:
        description: 'CMake build type'
        required: false
        type: string
        default: 'Release'

      with-tests:
        description: 'Enable tests'
        required: false
        type: boolean
        default: true

      with-benchmarks:
        description: 'Enable benchmarks'
        required: false
        type: boolean
        default: false

      with-thrift:
        description: 'Enable Modern Thrift (fbthrift)'
        required: false
        type: boolean
        default: false

      with-flatbuffers:
        description: 'Enable FlatBuffers'
        required: false
        type: boolean
        default: true

      with-fuse:
        description: 'Enable FUSE driver'
        required: false
        type: boolean
        default: false

      cmake-generator:
        description: 'CMake generator'
        required: false
        type: string
        default: ''

    secrets:
      github-token:
        description: 'GitHub token for caching'
        required: false
        default: ${{ github.token }}

    outputs:
      artifact-name:
        description: 'Name of build artifact'
        value: ${{ jobs.build.outputs.artifact-name }}

permissions:
  contents: read

jobs:
  build:
    name: ${{ inputs.os }} (${{ inputs.triplet }})
    runs-on: ${{ inputs.os }}

    outputs:
      artifact-name: ${{ steps.artifact.outputs.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          triplet: ${{ inputs.triplet }}
          cache-key: vcpkg-${{ inputs.os }}-${{ inputs.triplet }}
          github-token: ${{ secrets.github-token }}

      - name: Setup build dependencies
        uses: ./.github/actions/setup-build-deps
        with:
          platform: ${{ inputs.os }}
          with-fuse: ${{ inputs.with-fuse }}

      - name: Configure CMake
        uses: ./.github/actions/configure-cmake
        with:
          build-dir: build
          build-type: ${{ inputs.build-type }}
          generator: ${{ inputs.cmake-generator }}
          with-tests: ${{ inputs.with-tests }}
          with-benchmarks: ${{ inputs.with-benchmarks }}
          with-thrift: ${{ inputs.with-thrift }}
          with-flatbuffers: ${{ inputs.with-flatbuffers }}
          with-fuse-driver: ${{ inputs.with-fuse }}
          toolchain-file: ${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake

      - name: Build
        shell: bash
        run: |
          set -x
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cmake --build build --config ${{ inputs.build-type }} --parallel
          else
            cmake --build build --parallel
          fi

      - name: Run tests
        if: inputs.with-tests == true
        uses: ./.github/actions/run-ctest
        with:
          build-dir: build
          config: ${{ inputs.build-type }}
          skip-fuse: ${{ !inputs.with-fuse }}

      - name: Run benchmark smoke test
        if: inputs.with-benchmarks == true
        continue-on-error: true
        shell: bash
        run: |
          set -x
          BENCHMARK_BIN="build/dwarfs_benchmark"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            BENCHMARK_BIN="build/${{ inputs.build-type }}/dwarfs_benchmark.exe"
          fi

          if [[ -f "$BENCHMARK_BIN" ]]; then
            "$BENCHMARK_BIN" --benchmark_min_time=0.1s --benchmark_filter=.*Creation.*
          else
            echo "::warning::Benchmark binary not found: $BENCHMARK_BIN"
          fi

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          # Create artifact name from OS and triplet
          OS_NAME="${{ inputs.os }}"
          TRIPLET="${{ inputs.triplet }}"

          # Normalize OS name
          case "$OS_NAME" in
            ubuntu-latest|ubuntu-*) ARTIFACT_OS="linux" ;;
            macos-latest|macos-*) ARTIFACT_OS="macos" ;;
            windows-latest|windows-*) ARTIFACT_OS="windows" ;;
            *) ARTIFACT_OS="$OS_NAME" ;;
          esac

          # Extract architecture from triplet
          if [[ "$TRIPLET" =~ (x64|arm64|x86) ]]; then
            ARTIFACT_ARCH="${BASH_REMATCH[1]}"
          else
            ARTIFACT_ARCH="unknown"
          fi

          ARTIFACT_NAME="dwarfs-${ARTIFACT_OS}-${ARTIFACT_ARCH}"
          echo "name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "Artifact name: $ARTIFACT_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            build/dwarfs*
            build/**/*.dll
            build/**/*.exe
            build/**/*.so*
            build/**/*.dylib
          if-no-files-found: warn

  compat-test:
    name: Compatibility Test - ${{ inputs.os }} (${{ inputs.triplet }})
    runs-on: ${{ inputs.os }}
    if: inputs.with-tests == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Homebrew (for compat testing)
        if: runner.os == 'macOS'
        uses: ./.github/actions/setup-homebrew-dwarfs

      - name: Setup build dependencies
        uses: ./.github/actions/setup-build-deps
        with:
          platform: ${{ inputs.os }}
          with-fuse: false

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          triplet: ${{ inputs.triplet }}

      - name: Configure CMake (with compat tests)
        uses: ./.github/actions/configure-cmake
        with:
          build-dir: build-compat
          build-type: Release
          with-tests: true
          with-libdwarfs: true
          with-tools: false
          with-fuse-driver: false
          with-thrift: ${{ inputs.with-thrift }}
          with-flatbuffers: ${{ inputs.with-flatbuffers }}
          toolchain-file: ${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          cmake-args: -DWITH_COMPAT_TESTS=ON

      - name: Build compat tests
        shell: bash
        run: cmake --build build-compat --target dwarfs-compat-lib -j$(sysctl -n hw.ncpu 2>/dev/null || nproc)

      - name: Run compat tests
        working-directory: test/compat
        shell: bash
        run: |
          if [[ -f "./scripts/run_tests.sh" ]]; then
            ./scripts/run_tests.sh --all --format json
          else
            # Fallback: run test binary directly
            echo "Running compat test binary..."
            ../build-compat/test/compat/read_homebrew_files_test
          fi

      - name: Upload compat test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compat-results-${{ inputs.os }}-${{ inputs.triplet }}
          path: |
            test/compat/results-*.json
            build-compat/Testing/
          if-no-files-found: warn
