name: 'Comprehensive CLI Benchmarks'

# This workflow runs comprehensive benchmarks for all DwarFS CLI tools
# across multiple datasets to measure speed, space, and memory usage.

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM UTC
  push:
    paths:
      - 'benchmarks/**'
      - '.github/workflows/benchmark-comprehensive.yml'

permissions:
  contents: read

jobs:
  cli-benchmarks:
    name: CLI Benchmarks - ${{ matrix.build }} - ${{ matrix.dataset }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        build:
          - flatbuffers-only
          - dual-format
          - thrift-only
        dataset:
          - tiny
          - perl

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build cmake python3 python3-pip \
            libboost-all-dev libssl-dev libevent-dev \
            libdouble-conversion-dev libfmt-dev libgoogle-glog-dev \
            liblz4-dev liblzma-dev libzstd-dev libxxhash-dev \
            libbz2-dev libarchive-dev libgtest-dev \
            nlohmann-json3-dev libutf8cpp-dev libflac-dev \
            libfuse3-dev fuse3

      - name: Install Thrift (dual-format only)
        if: matrix.build == 'dual-format'
        run: sudo apt-get install -y libthrift-dev

      - name: Configure ${{ matrix.build }} Build
        run: |
          cmake -B build-${{ matrix.build }} -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDWARFS_WITH_FLATBUFFERS=ON \
            -DDWARFS_WITH_THRIFT=${{ matrix.build == 'dual-format' && 'ON' || 'OFF' }} \
            -DWITH_TOOLS=ON \
            -DWITH_FUSE_DRIVER=ON \
            -DWITH_TESTS=ON

      - name: Build ${{ matrix.build }}
        run: cmake --build build-${{ matrix.build }} --parallel

      - name: Run Tests
        continue-on-error: ${{ matrix.build == 'thrift-only' }}
        run: ctest --test-dir build-${{ matrix.build }} --output-on-failure -j

      - name: Download Perl Dataset
        if: matrix.dataset == 'perl'
        run: |
          python3 benchmarks/download_datasets.py --download perl

      - name: Create Tiny Dataset
        if: matrix.dataset == 'tiny'
        run: |
          mkdir -p /tmp/size-test
          echo "test content" > /tmp/size-test/file1.txt
          echo "more content" > /tmp/size-test/file2.txt
          mkdir -p /tmp/size-test/subdir
          echo "nested content" > /tmp/size-test/subdir/file3.txt

      - name: Run mkdwarfs Benchmarks
        run: |
          mkdir -p benchmark-results/${{ matrix.build }}

          # Test compression levels 1, 5, 9
          for level in 1 5 9; do
            echo "=== Compression Level $level ==="

            DATASET_PATH=${{ matrix.dataset == 'perl' && 'benchmark-files/perl-5.43.3' || '/tmp/size-test' }}
            IMAGE_PATH="benchmark-results/${{ matrix.build }}/${{ matrix.dataset }}-l${level}.dwarfs"

            # Measure with /usr/bin/time
            /usr/bin/time -v \
              ./build-${{ matrix.build }}/mkdwarfs \
              -i "$DATASET_PATH" \
              -o "$IMAGE_PATH" \
              -l $level \
              --log-level=warn \
              2>&1 | tee "benchmark-results/${{ matrix.build }}/${{ matrix.dataset }}-mkdwarfs-l${level}.log"

            # Record size
            ls -lh "$IMAGE_PATH"
          done

      - name: Run dwarfsck Benchmarks
        run: |
          for level in 1 5 9; do
            IMAGE_PATH="benchmark-results/${{ matrix.build }}/${{ matrix.dataset }}-l${level}.dwarfs"

            echo "=== dwarfsck Quick Check (level $level) ==="
            /usr/bin/time -v \
              ./build-${{ matrix.build }}/dwarfsck \
              --check-integrity \
              "$IMAGE_PATH" \
              2>&1 | tee "benchmark-results/${{ matrix.build }}/${{ matrix.dataset }}-dwarfsck-quick-l${level}.log"

            echo "=== dwarfsck Full Check (level $level) ==="
            /usr/bin/time -v \
              ./build-${{ matrix.build }}/dwarfsck \
              "$IMAGE_PATH" \
              2>&1 | tee "benchmark-results/${{ matrix.build }}/${{ matrix.dataset }}-dwarfsck-full-l${level}.log"
          done

      - name: Run dwarfsextract Benchmarks
        run: |
          for level in 1 5 9; do
            IMAGE_PATH="benchmark-results/${{ matrix.build }}/${{ matrix.dataset }}-l${level}.dwarfs"
            EXTRACT_DIR="benchmark-results/${{ matrix.build }}/extract-l${level}"

            echo "=== dwarfsextract (level $level) ==="
            /usr/bin/time -v \
              ./build-${{ matrix.build }}/dwarfsextract \
              -i "$IMAGE_PATH" \
              -o "$EXTRACT_DIR" \
              2>&1 | tee "benchmark-results/${{ matrix.build }}/${{ matrix.dataset }}-dwarfsextract-l${level}.log"

            # Cleanup
            rm -rf "$EXTRACT_DIR"
          done

      - name: Run dwarfs FUSE Benchmarks
        run: |
          for level in 1 5 9; do
            IMAGE_PATH="benchmark-results/${{ matrix.build }}/${{ matrix.dataset }}-l${level}.dwarfs"
            MOUNT_POINT="/tmp/dwarfs-mount-l${level}"

            mkdir -p "$MOUNT_POINT"

            echo "=== dwarfs FUSE Mount (level $level) ==="

            # Mount
            ./build-${{ matrix.build }}/dwarfs \
              "$IMAGE_PATH" \
              "$MOUNT_POINT" \
              -o perfmon=fuse,filesystem_v2,inode_reader_v2 &

            MOUNT_PID=$!
            sleep 2  # Wait for mount

            # Verify mount
            if mountpoint -q "$MOUNT_POINT"; then
              echo "Mount successful"

              # Test operations
              echo "=== find operation ==="
              /usr/bin/time -v find "$MOUNT_POINT" -type f 2>&1 | \
                tee "benchmark-results/${{ matrix.build }}/${{ matrix.dataset }}-dwarfs-find-l${level}.log"

              # Get perfmon stats
              if command -v getfattr &> /dev/null; then
                getfattr -n user.dwarfs.perfmon "$MOUNT_POINT" 2>/dev/null || true
              fi

              # Unmount
              fusermount -u "$MOUNT_POINT" || umount "$MOUNT_POINT"
              wait $MOUNT_PID 2>/dev/null || true
            else
              echo "Mount failed"
              kill $MOUNT_PID 2>/dev/null || true
            fi

            rmdir "$MOUNT_POINT"
          done

      - name: Generate Summary Report
        run: |
          cat > benchmark-results/${{ matrix.build }}/${{ matrix.dataset }}-summary.md <<'EOF'
          # ${{ matrix.build }} - ${{ matrix.dataset }} Benchmark Summary

          ## Build Configuration
          - Build: ${{ matrix.build }}
          - Dataset: ${{ matrix.dataset }}
          - Platform: Ubuntu 24.04 (amd64)
          - Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          ## Image Sizes
          EOF

          for level in 1 5 9; do
            IMAGE_PATH="benchmark-results/${{ matrix.build }}/${{ matrix.dataset }}-l${level}.dwarfs"
            SIZE=$(stat --format="%s" "$IMAGE_PATH")
            SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
            echo "- Level $level: ${SIZE_MB} MB" >> benchmark-results/${{ matrix.build }}/${{ matrix.dataset }}-summary.md
          done

          cat benchmark-results/${{ matrix.build }}/${{ matrix.dataset }}-summary.md

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.build }}-${{ matrix.dataset }}
          path: benchmark-results/${{ matrix.build }}/
          if-no-files-found: error
          retention-days: 90

  unified-benchmark:
    name: Unified Benchmark (All Tools)
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build cmake python3 python3-pip \
            libboost-all-dev libssl-dev libevent-dev \
            libdouble-conversion-dev libfmt-dev libgoogle-glog-dev \
            liblz4-dev liblzma-dev libzstd-dev libxxhash-dev \
            libbz2-dev libarchive-dev libgtest-dev libthrift-dev \
            nlohmann-json3-dev libutf8cpp-dev libflac-dev \
            libfuse3-dev fuse3

      - name: Build FlatBuffers-only
        run: |
          cmake -B build-fb -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDWARFS_WITH_FLATBUFFERS=ON \
            -DDWARFS_WITH_THRIFT=OFF \
            -DWITH_TOOLS=ON \
            -DWITH_FUSE_DRIVER=ON
          cmake --build build-fb --parallel

      - name: Build Dual-format
        run: |
          cmake -B build-dual -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDWARFS_WITH_FLATBUFFERS=ON \
            -DDWARFS_WITH_THRIFT=ON \
            -DWITH_TOOLS=ON \
            -DWITH_FUSE_DRIVER=ON
          cmake --build build-dual --parallel

      - name: Download Perl Dataset
        run: python3 benchmarks/download_datasets.py --download perl

      - name: Run Unified Benchmark
        run: |
          python3 benchmarks/run_all_benchmarks.py \
            --flatbuffers-tools build-fb \
            --thrift-tools build-dual \
            --perl-dataset benchmark-files/perl-5.43.3 \
            --levels 1,5,9 \
            --iterations 3 \
            --output benchmark-results/unified-results.json

      - name: Generate Comprehensive Report
        run: |
          python3 benchmarks/generate_comprehensive_report.py \
            benchmark-results/unified-results.json \
            benchmark-results/UNIFIED_BENCHMARK_REPORT.md

      - name: Display Report Summary
        run: head -n 100 benchmark-results/UNIFIED_BENCHMARK_REPORT.md

      - name: Upload Unified Results
        uses: actions/upload-artifact@v4
        with:
          name: unified-benchmark-results
          path: |
            benchmark-results/unified-results.json
            benchmark-results/UNIFIED_BENCHMARK_REPORT.md
            benchmark-results/images/
          if-no-files-found: error
          retention-days: 90