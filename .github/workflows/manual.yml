# Manual Testing Workflow
#
# On-demand workflow for flexible testing scenarios.
# Allows running specific tests, benchmarks, or compatibility checks.
#
# Use this for:
# - Testing a specific triplet or configuration
# - Running benchmarks on demand
# - Running compatibility tests
# - Testing before merges

name: Manual Tests

on:
  workflow_dispatch:
    inputs:
      workflow-type:
        description: 'Type of workflow to run'
        required: true
        type: choice
        options:
          - build-and-test
          - benchmark
          - compat
          - all
      triplet:
        description: 'vcpkg triplet to test'
        required: false
        type: string
        default: x64-linux
      config:
        description: 'Build configuration'
        required: false
        type: choice
        options:
          - flatbuffers-only
          - both-formats
        default: flatbuffers-only
      runner:
        description: 'GitHub Actions runner'
        required: false
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-24.04-arm64
          - macos-15
          - macos-14
          - windows-latest
        default: ubuntu-latest
      run-benchmarks:
        description: 'Include benchmarks (for workflow-type=all)'
        type: boolean
        default: false
      run-compat:
        description: 'Include compatibility tests (for workflow-type=all)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.resolve.outputs.runner }}
      triplet: ${{ steps.resolve.outputs.triplet }}

    steps:
      - name: Resolve inputs
        id: resolve
        run: |
          # Auto-detect triplet from runner if not specified
          if [[ "${{ inputs.triplet }}" == "x64-linux" ]]; then
            # Use the default or auto-detect
            case "${{ inputs.runner }}" in
              ubuntu-latest)
                TRIPLET="x64-linux"
                ;;
              ubuntu-24.04-arm64)
                TRIPLET="arm64-linux"
                ;;
              macos-15)
                TRIPLET="x64-osx"
                ;;
              macos-14)
                TRIPLET="arm64-osx"
                ;;
              windows-latest)
                TRIPLET="x64-windows-static"
                ;;
              *)
                TRIPLET="${{ inputs.triplet }}"
                ;;
            esac
          else
            TRIPLET="${{ inputs.triplet }}"
          fi

          echo "runner=${{ inputs.runner }}" >> $GITHUB_OUTPUT
          echo "triplet=$TRIPLET" >> $GITHUB_OUTPUT

          echo "=== Manual Test Configuration ==="
          echo "Workflow type: ${{ inputs.workflow-type }}"
          echo "Runner: ${{ inputs.runner }}"
          echo "Triplet: $TRIPLET"
          echo "Config: ${{ inputs.config }}"

  build-and-test:
    name: Build and Test
    needs: validate-inputs
    if: inputs.workflow-type == 'build-and-test' || inputs.workflow-type == 'all'

    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ${{ needs.validate-inputs.outputs.runner }}
      triplet: ${{ needs.validate-inputs.outputs.triplet }}
      config: ${{ inputs.config }}
      cache-key: manual-${{ github.run_id }}

  benchmark:
    name: Benchmark
    needs: validate-inputs
    if: inputs.workflow-type == 'benchmark' || (inputs.workflow-type == 'all' && inputs.run-benchmarks == true)

    uses: ./.github/workflows/_benchmark-reusable.yml
    with:
      runner: ${{ needs.validate-inputs.outputs.runner }}
      triplet: ${{ needs.validate-inputs.outputs.triplet }}

  compat:
    name: Compatibility Test
    needs: validate-inputs
    if: inputs.workflow-type == 'compat' || (inputs.workflow-type == 'all' && inputs.run-compat == true)

    uses: ./.github/workflows/_compat-test-reusable.yml
    with:
      runner: ${{ needs.validate-inputs.outputs.runner }}
      triplet: ${{ needs.validate-inputs.outputs.triplet }}

  summary:
    name: Summary
    needs: [validate-inputs, build-and-test, benchmark, compat]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Display results
        run: |
          echo "=== Manual Test Results ==="
          echo ""
          echo "Workflow type: ${{ inputs.workflow-type }}"
          echo "Triplet: ${{ needs.validate-inputs.outputs.triplet }}"
          echo "Config: ${{ inputs.config }}"
          echo ""
          echo "Job Results:"
          echo "  Build & Test: ${{ needs.build-and-test.result || 'skipped' }}"
          echo "  Benchmark: ${{ needs.benchmark.result || 'skipped' }}"
          echo "  Compatibility: ${{ needs.compat.result || 'skipped' }}"
          echo ""
          echo "Check individual job logs for details."

      - name: Overall status
        run: |
          # Determine overall status
          if [[ "${{ needs.build-and-test.result }}" == "success" ]] || \
             [[ "${{ needs.build-and-test.result }}" == "skipped" ]]; then
            if [[ "${{ needs.benchmark.result }}" == "success" ]] || \
               [[ "${{ needs.benchmark.result }}" == "skipped" ]]; then
              if [[ "${{ needs.compat.result }}" == "success" ]] || \
                 [[ "${{ needs.compat.result }}" == "skipped" ]]; then
                echo "✅ All jobs completed successfully"
                exit 0
              fi
            fi
          fi
          echo "❌ Some jobs failed or were cancelled"
          exit 1
