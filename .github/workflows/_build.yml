# Core Reusable Build Workflow
#
# Single-source-of-truth for all DwarFS CI builds.
# Used by pr-validation.yml, ci.yml, ci-matrix.yml, and release.yml.
#
# Caching Strategy:
# - vcpkg: Lukka/run-vcpkg with GitHub Actions cache
# - CMake builds: Lukka/run-cmake with buildCache property
# - ccache: Chocobo1/setup-ccache-action for compiler object caching
#
# Workflow Structure (following boyle pattern with DwarFS-specific deps):
# 1. Checkout (with submodules)
# 2. Platform-specific dependencies (macOS/Linux/Windows)
# 3. Setup MSVC (Windows only)
# 4. Setup gcc version (Linux only)
# 5. Setup vcpkg
# 6. Install CMake and Ninja
# 7. Install common dependencies (Python packages)
# 8. Setup ccache
# 9. Create FUSE mount directory (Linux only)
# 10. Build + Test with CMakePresets
# 11. Upload artifacts

name: Build

on:
  workflow_call:
    inputs:
      runner:
        description: 'GitHub Actions runner'
        required: true
        type: string
      triplet:
        description: 'vcpkg triplet (x64-linux, arm64-osx, x64-windows-static, etc)'
        required: true
        type: string
      config:
        description: 'Build config: production or experimental'
        required: true
        type: string
        default: production
      vcpkg-manifest:
        description: 'vcpkg manifest file (vcpkg-production.json or vcpkg-experimental.json)'
        required: false
        type: string
        default: ''
      upload-artifacts:
        description: 'Upload build artifacts'
        required: false
        type: boolean
        default: false
      continue-on-error:
        description: 'Whether to continue if this job fails (for experimental builds)'
        required: false
        type: boolean
        default: false

    outputs:
      build-status:
        description: 'Build success or failure'
        value: ${{ jobs.build.outputs.status }}

jobs:
  build:
    name: ${{ inputs.runner }} · ${{ inputs.triplet }} · ${{ inputs.config }}
    runs-on: ${{ inputs.runner }}
    continue-on-error: ${{ inputs.continue-on-error }}

    permissions:
      contents: read

    outputs:
      status: ${{ steps.status.outputs.result }}

    env:
      VCPKG_DEFAULT_TRIPLET: ${{ inputs.triplet }}
      VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/vcpkg_ports
      VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/vcpkg_triplets
      VCPKG_COMMIT: f14401ca0f2754347c3864da7488a9b955b4e47a
      GCC_VERSION: '14'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      # Platform-specific dependencies (must be before vcpkg)
      - name: 🔨 Setup platform-specific dependencies
        shell: bash
        run: |
          case "$RUNNER_OS" in
            macOS)
              bash scripts/github-actions/deps/install-macos-deps.sh
              ;;
            Linux)
              bash scripts/github-actions/deps/install-linux-deps.sh
              ;;
            Windows)
              bash scripts/github-actions/deps/install-windows-deps.sh
              ;;
          esac

      # Windows: Setup MSVC before vcpkg
      - name: 🪟 Setup MSVC Developer Environment
        if: runner.os == 'Windows'
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: ${{ contains(inputs.triplet, 'arm64') && 'arm64' || 'x64' }}

      # Windows: Add MSVC tools to PATH for CMake
      - name: 🪟 Add MSVC to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vsPath = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise"
          $vcToolsVersion = Get-ChildItem "$vsPath\VC\Tools\MSVC" | Select-Object -First 1 -ExpandProperty Name

          if ("${{ contains(inputs.triplet, 'arm64') }}" -eq "true") {
            # Building for ARM64 (cross-compile from x64 host)
            $binPath = "$vsPath\VC\Tools\MSVC\$vcToolsVersion\bin\HostX64\arm64"
          } else {
            # Building for x64
            $binPath = "$vsPath\VC\Tools\MSVC\$vcToolsVersion\bin\HostX64\x64"
          }

          echo "Adding MSVC bin directory to PATH: $binPath"
          echo "$binPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Linux: Setup gcc version via update-alternatives
      - name: 🔧 Install gcc on Linux
        if: runner.os == 'Linux'
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-${{ env.GCC_VERSION }} ${{ env.GCC_VERSION }}
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-${{ env.GCC_VERSION }} ${{ env.GCC_VERSION }}
          sudo update-alternatives --set gcc /usr/bin/gcc-${{ env.GCC_VERSION }}
          sudo update-alternatives --set g++ /usr/bin/g++-${{ env.GCC_VERSION }}
        shell: bash

      - name: 📦 Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          vcpkgJsonGlob: ${{ inputs.vcpkg-manifest || 'vcpkg-production.json' }}
          vcpkgConfigurationJsonGlob: vcpkg-configuration.json
          vcpkgDirectory: ${{ github.workspace }}/../vcpkg

      - name: 🔨 Install CMake and Ninja
        uses: lukka/get-cmake@v10.4
        with:
          cmakeVersion: 3.28.x

      # Common dependencies (Python packages for manpage generation)
      - name: 📦 Install common dependencies
        shell: bash
        run: |
          bash scripts/github-actions/deps/install-common-deps.sh

      - name: 💾 Setup ccache
        uses: Chocobo1/setup-ccache-action@v1
        with:
          store_cache: false
          restore_cache: false
          remove_stale_cache: true
          override_cache_key: ccache_${{ inputs.triplet }}_${{ inputs.config }}

      # Create FUSE mount directory for Linux tests
      - name: 🔌 Create FUSE mount directory
        if: runner.os == 'Linux'
        run: |
          sudo mkdir -p /tmp/dwarfs-test-mount
          sudo chmod 777 /tmp/dwarfs-test-mount
          echo "DWARFS_TEST_MOUNT_DIR=/tmp/dwarfs-test-mount" >> $GITHUB_ENV
          echo "✓ Created FUSE mount directory: /tmp/dwarfs-test-mount"
        shell: bash

      - name: 🏗️ Build and Test
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ inputs.triplet }}-${{ inputs.config }}
          buildPreset: ${{ inputs.triplet }}-${{ inputs.config }}
          testPreset: ${{ inputs.triplet }}-${{ inputs.config }}

      - name: 📊 Upload build artifacts
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dwarfs-${{ inputs.triplet }}-${{ inputs.config }}
          path: build-${{ inputs.triplet }}-${{ inputs.config }}/
          retention-days: 7
          if-no-files-found: warn

      - name: ✅ Status
        id: status
        if: always()
        run: echo "result=${{ job.status }}" >> $GITHUB_OUTPUT
