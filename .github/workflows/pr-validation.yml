# PR Validation Workflow
#
# Fast feedback for pull requests.
# Tests Ubuntu x64 with both configs for quick validation.
# Target runtime: ~10 minutes

name: PR Validation

on:
  pull_request:
    branches: [main, feature/*]
  workflow_dispatch:

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Ubuntu x64 - production
  validate-ubuntu-production:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: production
      build-type: Release
      cache-key: pr-validation-ubuntu-x64

  # Ubuntu x64 - experimental
  validate-ubuntu-experimental:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: experimental
      build-type: Release
      cache-key: pr-validation-ubuntu-x64

