# PR Validation Workflow
#
# Fast feedback for pull requests.
# Tests Ubuntu x64 with both configs for quick validation.
# Target runtime: ~10 minutes

name: PR Validation

on:
  pull_request:
    branches: [main, feature/*]
  workflow_dispatch:

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Ubuntu x64 - flatbuffers
  validate-ubuntu-flatbuffers:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: flatbuffers
      build-type: Release
      cache-key: pr-validation-ubuntu-x64

  # Ubuntu x64 - flatbuffers-with-thrift
  validate-ubuntu-thrift:
    uses: ./.github/workflows/_build-test-reusable.yml
    with:
      runner: ubuntu-latest
      triplet: x64-linux
      config: flatbuffers-with-thrift
      build-type: Release
      cache-key: pr-validation-ubuntu-x64

