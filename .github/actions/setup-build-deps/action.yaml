# Minimal build dependencies action for DwarFS CI
#
# Since we use vcpkg for ALL dependencies, we only need:
# 1. Essential build tools (cmake, ninja, git, pkg-config for vcpkg's use)
# 2. FUSE libraries (for tests, when requested)
# 3. Autoconf tools (for building vcpkg dependencies from source if needed)
#
# No system libraries (openssl, boost, xxhash, etc.) - vcpkg provides everything!

name: 'Setup Build Dependencies'
description: 'Install minimal build dependencies for vcpkg-based DwarFS builds'

inputs:
  with-fuse:
    description: 'Install FUSE libraries for tests'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install dependencies (Windows)
      shell: powershell
      run: |
        Write-Host "Installing Windows build dependencies..."

        # WinFsp for FUSE support
        if ("${{ inputs.with-fuse }}" -eq "true") {
          choco install winfsp -y
        }

        Write-Host "✓ Windows dependencies installed"

    - name: Install dependencies (macOS)
      shell: bash
      run: |
        set -x
        echo "Installing macOS build dependencies..."

        # Essential build tools
        brew install ninja cmake pkg-config

        # FUSE support for tests
        if [[ "${{ inputs.with-fuse }}" == "true" ]]; then
          if ! brew list macfuse 2>/dev/null && ! brew list fuse-t 2>/dev/null; then
            echo "::warning::No FUSE package found. Install macFUSE or FUSE-T manually."
          fi
        fi

        echo "✓ macOS dependencies installed"

    - name: Install dependencies (Linux)
      shell: bash
      run: |
        set -x
        echo "Installing Linux build dependencies..."

        # Detect package manager
        if command -v apt-get &> /dev/null; then
          PKG_MANAGER="apt"
        elif command -v yum &> /dev/null; then
          PKG_MANAGER="yum"
        elif command -v apk &> /dev/null; then
          PKG_MANAGER="apk"
        else
          echo "::warning::Unable to detect package manager"
          exit 0
        fi

        case "$PKG_MANAGER" in
          apt)
            sudo apt-get update
            sudo apt-get install -y \
              build-essential \
              git \
              ninja-build \
              pkg-config \
              autoconf \
              autoconf-archive \
              automake \
              libtool

            if [[ "${{ inputs.with-fuse }}" == "true" ]]; then
              sudo apt-get install -y libfuse3-dev fuse3
            fi
            ;;

          yum)
            sudo yum install -y \
              gcc-c++ \
              git \
              ninja-build \
              pkgconfig \
              autoconf \
              autoconf-archive \
              automake \
              libtool

            if [[ "${{ inputs.with-fuse }}" == "true" ]]; then
              sudo yum install -y fuse3-devel
            fi
            ;;

          apk)
            apk add --no-cache \
              build-base \
              git \
              ninja \
              pkgconf \
              autoconf \
              autoconf-archive \
              automake \
              libtool

            if [[ "${{ inputs.with-fuse }}" == "true" ]]; then
              apk add --no-cache fuse3-dev fuse3
            fi
            ;;
        esac

        echo "✓ Linux dependencies installed"

    - name: Create FUSE mount directory
      if: inputs.with-fuse == 'true'
      shell: bash
      run: |
        # Create temporary directory for FUSE mounts
        sudo mkdir -p /tmp/dwarfs-test-mount
        sudo chmod 777 /tmp/dwarfs-test-mount
        echo "✓ Created FUSE mount directory: /tmp/dwarfs-test-mount"

    - name: Set environment variables
      shell: bash
      run: |
        # FUSE mount point for tests
        if [[ "${{ inputs.with-fuse }}" == "true" ]]; then
          echo "DWARFS_TEST_MOUNT_DIR=/tmp/dwarfs-test-mount" >> $GITHUB_ENV
        fi

        echo "✓ Environment variables set"
